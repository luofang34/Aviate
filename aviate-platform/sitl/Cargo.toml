[package]
name = "aviate-platform-sitl"
edition.workspace = true
version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "gz-bridge"
path = "src/bin/gz_bridge.rs"
required-features = ["gz-plugin"]

[features]
default = []
# Enable Gazebo bridge via shared memory FFI (zero-copy, requires libaviate_gz_bridge.so)
# This is the recommended way to connect to Gazebo for SITL
gz-plugin = []

[dependencies]
aviate-core = { path = "../../aviate-core" }
aviate-mavlink = { path = "../../aviate-mavlink" }
