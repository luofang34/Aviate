[package]
name = "aviate-platform-sitl"
edition.workspace = true
version.workspace = true
license.workspace = true

[lib]
path = "src/lib.rs"

[features]
default = []
# Enable Gazebo bridge (requires gz-transport system libraries)
gz-bridge = ["gz", "gz-msgs"]

[dependencies]
aviate-core = { path = "../../aviate-core" }
aviate-mavlink = { path = "../../aviate-mavlink" }

# Gazebo transport (optional, for SITL bridge)
gz = { version = "0.9", features = ["harmonic"], optional = true }
gz-msgs = { version = "0.9", optional = true }
