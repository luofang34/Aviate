# AirframePreset (schema 1): PX4-gazebo-models X500 (gz SITL).
#
# The mixer geometry matters: the X500 spins CW on the FL+RR diagonal
# — the generic quad-x mixer closes the yaw loop backwards on this
# model.
#
# Schema-1 semantics: hover_thrust_seed is the BOUNDARY command at
# trim (a rotor-speed fraction for this quadratic plant). The loader
# exposes it only through `hover_thrust_force_seed()`, which converts
# explicitly (0.77² = 0.5929 force-domain — 20.25 N weight / 34.19 N
# max thrust). A schema_version = 2 file states the seed in the force
# domain directly; changing this file's value requires measured trim
# evidence (#140 acceptance), not a hand edit.

schema_version = 1
name = "x500"
mixer = "quad-x-x500"
motor_count = 4
hover_thrust_seed = 0.77
actuator_curve = "quadratic"

[gains]
pos_p = [0.5, 0.5, 0.5]
pos_accel_limits = [2.0, 2.0, 1.0]
pos_vel_caps = [2.0, 2.0, 1.5]
vel_p = [1.2, 1.2, 0.4]
vel_i = [0.05, 0.05, 0.05]
vel_d = [0.0, 0.0, 0.0]
vel_max_roll_pitch = 0.35
vel_accel_ff = 0.0
att_p = [3.5, 3.5, 2.5]
rate_p = [0.30, 0.30, 0.60]
rate_d = [0.0, 0.0, 0.05]
rate_d_lpf_alpha = 0.5

[limits]
max_roll = 0.78
max_pitch = 0.78
max_roll_rate = 3.0
max_pitch_rate = 3.0
max_yaw_rate = 3.0
max_horizontal_speed = 10.0
max_climb_rate = 2.0
max_descent_rate = 2.0
max_altitude = 100.0
min_altitude = 0.0
