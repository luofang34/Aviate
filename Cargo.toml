[workspace]
members = [
    "aviate-core",
    "aviate-mavlink",
    "aviate-airframes/multirotor",
    "aviate-airframes/fixed-wing",
    "aviate-hal/io",
    "aviate-hal/xil",
    "aviate-hal/xil/backends/gz",
    "aviate-hal/xil/backends/mavlink-hil",
    "aviate-boards/sitl-gazebo",
    "aviate-boards/sitl-jmavsim",
    "aviate-apps/sitl-gazebo-x500",
    "aviate-apps/sitl-jmavsim-generic-quad-x",
    "tests/lint-verification",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.0.0"
license = "MIT OR Apache-2.0"

[workspace.metadata]
description = "Aviate workspace — see docs/specs/AVIATE_SPEC_v0.5.md and docs/language/AVIATE_LANGUAGE_PROFILE.md for constraints."

[workspace.metadata.release]
pre-release-hook = ["./scripts/run_pre_release_checks.sh"]

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"