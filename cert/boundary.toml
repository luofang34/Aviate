# Aviate certification boundary.
#
# Declares which workspace crates sit inside the DO-178C scope and which
# live outside it (SITL/HIL backends, board HAL shims, tooling, test
# harnesses). `no_out_of_scope_deps = true` rejects any in-scope crate
# that pulls in a sandbox crate.
#
# `aviate-runtime` joins the boundary under its `env-flight` feature
# build (real-hardware, no_std). The crate's `env-sitl` / `env-hitl`
# features pull in `aviate-hal-xil` and other sandbox transports —
# those features SHALL NOT be enabled in flight builds, enforced by
# the mutually-exclusive `compile_error!` guards in
# `aviate-runtime/src/lib.rs`. Boundary closure under env-flight is
# witnessed by HLR-RTM-001 / LLR-RTM-101.

[schema]
version = "0.0.1"

[scope]
in_scope = [
    "aviate-core",
    "aviate-config",
    "aviate-hal-io",
    "aviate-drivers",
    "aviate-airframe-multirotor",
    "aviate-airframe-fixed-wing",
    "aviate-link",
    "aviate-runtime",
    "aviate-security",
]

trace_roots = ["cert/trace"]

explicit_forbidden = []

[policy]
no_out_of_scope_deps = true
forbid_build_rs = true
forbid_proc_macros = true

[forbidden_external]
# External crates banned from the boundary. Populate as we harden the
# scope (e.g. tokio in aviate-core, std-only crates, etc.).

[dal]
default_dal = "D"

# [dal.crate_overrides]
# "aviate-core" = "B"
