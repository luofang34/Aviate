# Aviate ratcheting-floors config.
#
# Every dimension here is a lower bound: `cargo evidence floors` fails if
# the current measurement drops below the committed value. Lowering a
# floor requires a `Lower-Floor: <dimension> <reason>` line on the PR
# body / squash-commit description; friction is intentional.
#
# Trace floors are seeded to the count produced by the first real
# requirement family — Estimator extraction (SYS-EST-001 / HLR-EST-001..3 /
# LLR-EST-101..108 / TST-EST-001..010). Subsequent PRs bump each floor in
# the same PR that adds the entries; the gate then keeps those entries
# from silently disappearing.
#
# Left off on purpose today:
#   - test_count / library_panics: the tool's measurement helpers look
#     at the standard-layout `crates/*/src/` subtree and return 0 for
#     our `aviate-*` layout. Enabling them would gate against a
#     permanently-zero reading, which is worse than nothing. Revisit
#     once the tool supports a configurable crate-root glob (or we
#     reshape the workspace).

# Measurement keys match the names emitted by
# `evidence_core::floors::current_measurements`: `trace_sys`,
# `trace_hlr`, `trace_llr`, `trace_test` — NO `_count` suffix. Earlier
# revisions used `_count`-suffixed keys; those silently returned
# current=0 (no matching measurement key) and only "passed" because the
# committed floor was 0 too.
[floors]
trace_sys = 5
trace_hlr = 11
trace_llr = 22
trace_test = 26

[delta_ceilings]
# Reserved by the tool for new-additions-in-diff checks. Parsed today,
# enforced in a follow-up.
