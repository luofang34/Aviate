## Aviate algorithm-identity registry.
##
## Each substitutable trait impl declares a 64-bit `ALGORITHM_ID`
## constant (LLR-PIPE-104). The IDs feed
## `KernelPipeline::algorithm_identity_hash` (LLR-PIPE-103), which
## spec §16 uses as the cross-channel firmware-bundle witness.
##
## **Add a new impl here in the same PR that introduces the impl.**
## IDs are 64-bit; pick from a clearly-distinct subspace per trait
## class (estimator / controller / mixer / sanitizer) so accidental
## collisions are obvious. Prefer ASCII-encoded mnemonics
## (`u64::from_be_bytes(b"ESTIMEKF")`) for human readability.
##
## **Never reuse a retired ID.** A channel running an old firmware
## image with the retired impl plus a new firmware image with the
## reused ID would compare byte-equal at the lockstep gate, which is
## exactly the failure mode this registry exists to prevent.
##
## Floors: cargo-evidence does not gate this file directly. The
## guardrail is LLR-PIPE-104 + TST-PIPE-104 (`identity_hash_is_stable
## _across_builds`), which pins the FNV folding output for the
## production bundle (Ekf / MultirotorController / QuadXMixer /
## Sanitizer). Touching that test means a real cross-channel hash
## change shipped — review carefully.

[estimator]
"ekf.basic-15state.v3" = 0x4554_494D_454B_4634  # Ekf
# Retired: "ekf.basic-15state.v2" = 0x4554_494D_454B_4633. v2 allowed
# an age-triggered reset that adopted a persistently rejected aiding
# source after a fixed timeout, and its rejection path did not stale
# aiding ages or drop validity on sustained rejection. v3 never adopts
# a rejected source by timeout and surfaces sustained rejection as
# lost validity. Same 15-state shape, different observable recovery
# behavior, so a v2 image must not match a v3 one at the lockstep
# gate.
# Retired: "ekf.basic-15state.v1" = 0x4554_494D_454B_4632. v1 applied
# attitude-error corrections about body axes while the covariance
# Jacobians define a global (nav-frame) error — anti-corrective past
# 180° of yaw, diverging the filter under sustained yaw (#123). v2
# applies corrections in the global frame; same state shape, different
# fusion arithmetic. Never reuse 0x4554_494D_454B_4632.
# Retired: "ekf.basic-18state.v1" = 0x4554_494D_454B_4631 (18-state
# ESKF with a mag-bias block). The mag-bias state was structurally
# unobservable and has been removed; the state vector shape changed,
# so a fresh ID prevents an old 18-state image from matching the new
# 15-state one at the cross-channel lockstep gate. Never reuse
# 0x4554_494D_454B_4631.

[controller]
"controller.multirotor.v2"  = 0x4354_4C4D_5552_5632  # MultirotorController
# Retired: "controller.multirotor.v1" = 0x4354_4C4D_5552_5631. v1's
# velocity loop mapped the NED acceleration command straight to
# roll/pitch without rotating into the heading frame — correct only
# at yaw 0, anti-corrective past 90° (#110). Never reuse the v1 ID.
"controller.fixed_wing.v1"  = 0x4354_4C46_5747_5631  # FixedWingController
"controller.vtol.v1"        = 0x4354_4C56_544F_4C31  # VtolController

[mixer]
"mixer.quad_x.v2"      = 0x4D49_5851_5541_4432  # QuadXMixer
"mixer.quad_x_x500.v2" = 0x4D49_5851_5835_5632  # QuadXMixerX500
# Retired: "mixer.quad_x.v1" = 0x4D49_5851_5541_4458 and
# QuadXMixerX500's pre-registry ID 0x4D49_5851_5435_3030. v1 mixers
# clamped each motor independently, silently truncating whichever
# axis pushed a motor past its limit; v2 resolves saturation by
# priority (roll/pitch > collective > yaw), so saturated-regime
# outputs differ and a v1 image must not match a v2 one at the
# lockstep gate.

[sanitizer]
"sanitizer.group_aware.v1" = 0x5341_4E47_5250_5631  # Sanitizer

# Test-only impls (live alongside the trait impls in tests/, kept
# out of the production allocation space — high bit can be 0 or
# any pattern as long as it doesn't collide with production IDs).
[testing]
"mixer.kernel_dummy.v1"      = 0x4D49_5854_4553_5431  # tests::DummyMixer
"controller.test_stateful.v1"= 0x4354_4C54_4553_5431  # TestStatefulController
"estimator.mode_gate_fixed.v1" = 0x4649_5845_4553_5431  # mode_entry_gating_tests::FixedEstimator
"estimator.mock.v1"          = 0x4553_544D_4F43_4B00  # MockEstimator
"controller.mock.v1"         = 0x4354_4C4D_4F43_4B00  # MockController
"mixer.mock.v1"              = 0x4D49_584D_4F43_4B00  # MockMixer
"sanitizer.mock.v1"          = 0x5341_4E4D_4F43_4B00  # MockSanitizer
