owner = "aviate-core@aviate"
description = """
The unit-test family in
`aviate-core/src/kernel/snapshot.rs::tests` exercises
`decide_lockstep` along the LLR-CCS-105 contract:

  1. `decide_enter_when_all_peers_agree` — quorum met, all
     peers byte-equal-with-local ⇒ Enter.
  2. `decide_refuse_hash_mismatch_takes_priority_over_state`
     — a peer with both hash and state divergence surfaces as
     `RefuseHashMismatch` (LLR-CCS-105.2.a precedence over
     .2.b).
  3. `decide_refuse_state_mismatch_when_hash_agrees` — a
     peer with bit-flipped state but matching hash surfaces
     as `RefuseStateMismatch`.
  4. `decide_refuse_quorum_when_below_threshold` — empty
     peer set with `quorum=2` ⇒ `RefuseQuorum { present: 0,
     required: 2 }`.
  5. `decide_refuse_quorum_does_not_inspect_peers` — one
     present peer that would mismatch + quorum 2 ⇒
     `RefuseQuorum`, NOT `RefuseHashMismatch`. Witnesses
     the "absence of evidence" semantics from LLR-CCS-105.1
     (RefuseQuorum returned WITHOUT peer inspection).
  6. `decide_enter_when_zero_quorum_required_and_no_peers`
     — degenerate edge case with zero quorum + empty peers,
     used by single-channel fault-degraded mode.
  7. `decide_refuse_config_mismatch_when_algorithm_agrees`
     — same algorithm hash, divergent config hash ⇒
     `RefuseConfigMismatch`. Witnesses LLR-CCS-105.2.b.
  8. `decide_refuse_config_mismatch_takes_priority_over_state`
     — both config and state diverge ⇒
     `RefuseConfigMismatch` (precedence over state mismatch
     per LLR-CCS-104.3 vs .4 ordering).
"""
