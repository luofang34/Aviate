id = "TST-EST-001"
title = "ekf_default_creates_valid_instance"
owner = "aviate-core@aviate"
description = """
Verifies that Ekf::default() produces a filter with
is_initialized() == false and finite, well-formed initial state.
Anchor for LLR-EST-101 (init seeding precondition) and LLR-EST-107
(initial accessor return values).
"""
