id = "TST-EST-002"
title = "ekf_predict_on_uninitialized_returns_early"
owner = "aviate-core@aviate"
description = """
Calls predict() on an Ekf that has never had init() invoked and
asserts state is unchanged. Verifies LLR-EST-102 clause (a) and
LLR-EST-103's safety contract that propagation is gated on init.
"""
traces_to = ["d9fa9931-db32-4965-afb0-c7d80d31f57c"]

