[[tests]]
uid = "df421f16-968c-4fa7-a49d-8c0daa94d851"
id = "TST-STATE-006"
title = "ekf_tests.rs full suite (43 tests, EstimatorState pattern)"
owner = "aviate-core@aviate"
description = """
The `tests/ekf_tests.rs` suite (43 tests) was rewritten in Phase 4
to use the `(ekf: Ekf, state: EstimatorState)` pair pattern: pure
state operations are inherent on `EstimatorState`
(`state.init/get_estimate/is_initialized/has_numeric_fault/reset`),
algorithm operations route through the Estimator trait
(`ekf.predict(&mut state, imu, dt)`,
`ekf.update_gnss(&mut state, reading)`, etc.). The suite verifies
LLR-STATE-105 — that the trait surface flip preserves end-to-end
filter behavior across init / predict / GNSS-fusion / baro / mag /
innovation gating / multi-update convergence paths.
"""
traces_to = ["edbab6c9-f097-45ed-8c5a-10f3e2d4fce1"]

[[tests]]
uid = "4ebf52dc-fc28-49e1-b0e4-3dc4360d218b"
id = "TST-STATE-007"
title = "mixer_tests.rs full suite (24 tests, ActuatorFallbackState pattern)"
owner = "aviate-core@aviate"
description = """
The `tests/mixer_tests.rs` suite (24 tests) was rewritten in Phase
4 to use the `(sanitizer: Sanitizer, fallback: ActuatorFallbackState)`
pair pattern. Tests construct an explicit `let mut fallback =
ActuatorFallbackState::default();` and pass `&mut fallback` to each
`sanitizer.sanitize(...)` call. The fallback-counter assertions now
read `fallback.last_good[i] / age[i] / consecutive_fallback[i]`
directly. Verifies LLR-STATE-106 — that the new sanitizer surface
preserves the per-group last-good / age / consecutive-fallback
semantics of the pre-Phase-4 in-sanitizer state.
"""
traces_to = ["62a6ae4d-f6b4-4460-a447-5b753e432e85"]

