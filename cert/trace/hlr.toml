[[requirements]]
uid = "c42a507f-d988-4694-b5c3-ed34763fb0f9"
id = "HLR-EST-001"
title = "Estimator trait surface is closed"
owner = "aviate-core@aviate"
description = """
The aviate-core Estimator trait SHALL expose exactly the methods
init, predict, update_gnss, update_baro, update_mag, get_estimate,
is_initialized, has_numeric_fault, reset, plus the test-hooks-gated
set_state. No additional non-test methods SHALL be added without
filing a derived requirement (DRQ) and re-tracing affected LLRs.
"""
verification_methods = ["review", "test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "dd494a24-a5f8-4cea-b687-a471edbfea17"
id = "HLR-EST-002"
title = "Estimator quality gates kernel state validity"
owner = "aviate-core@aviate"
description = """
When the estimator reports EstimateQuality::Unusable through
get_estimate(), the kernel SHALL NOT consume the estimate for
control or actuation in the same cycle. Pre-arm checks SHALL
treat is_initialized()==false as blocking. A latched numeric
fault (has_numeric_fault()==true) SHALL prevent arm() from
succeeding until reset() is called.
"""
verification_methods = ["test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "9262663e-c149-424f-b159-2ae3cb176ee7"
id = "HLR-EST-003"
title = "Estimator init is deterministic and bounded-time"
owner = "aviate-core@aviate"
description = """
Estimator::init SHALL complete in a bounded number of CPU cycles
independent of input magnitudes (no iterative convergence, no
recursion). Repeated invocation with identical (pos, vel, quat)
inputs SHALL leave the estimator in identical observable state
(get_estimate() and is_initialized() returning equal values).
predict() and update_*() called before init() SHALL be no-ops
(safety: never propagate from uninitialized state).
"""
verification_methods = ["test", "review"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "4cf7189d-23e6-470a-b71c-c90a81c59970"
id = "HLR-CFG-001"
title = "Resolved kernel configuration is the single source of flight-period truth"
owner = "aviate-core@aviate"
description = """
The kernel SHALL hold flight-period configuration (limits,
mode_config, fault_table, command_timeout_ms, safe_output) in
exactly one structure (`ResolvedKernelConfig`). The kernel SHALL NOT
duplicate any of these values into an additional storage location
during construction or during the flight loop.

The `AviateKernelTrait::get_config()` method SHALL return a borrow of
this single structure; no copies, no shadow caches.
"""
verification_methods = ["review", "test"]
traces_to = ["ed45538e-11f2-4887-95c2-91625b4a59cb"]

[[requirements]]
uid = "589cfa68-0179-4683-a787-0c90a54440df"
id = "HLR-STATE-001"
title = "KernelState is the kernel's runtime mutation surface"
owner = "aviate-core@aviate"
description = """
The kernel's per-cycle mutation paths — `update()`, `init_step()`,
`arm()`, `disarm()`, `ground_reset()`, `request_config_mode()`,
`handle_degradation()` — SHALL mutate kernel state only through
`self.state.<field>` references. The kernel SHALL NOT introduce
parallel state caches (`pipeline.<state>`, `cfg.<state>`, or
top-level shadows) under any future PR without first relocating the
canonical owner inside `KernelState` and filing a new LLR.

When a function reads-and-writes multiple `KernelState` fields in
the same scope, the destructure idiom documented at the head of
`kernel/state.rs` SHALL be applied (see LLR-STATE-103).
"""
verification_methods = ["review", "test"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "33190e76-603e-4cd7-8eee-468bcc94fa10"
id = "HLR-STATE-003"
title = "Every safety-relevant persistent state field has exactly one owner"
owner = "aviate-core@aviate"
description = """
Phase 4 completes the single-owner invariant: in addition to the
seven lifecycle/runtime fields P3 relocated, the persistent EKF
filter state (quat / pos / vel / biases / p_cov / initialized /
quat_fault / last_gyro_body) and persistent sanitizer fallback
state (last_good / age / consecutive_fallback) SHALL live ONLY
inside `KernelState` (as `KernelState.estimator: EstimatorState` and
`KernelState.fallback: ActuatorFallbackState`). The pipeline-side
algorithm objects (`Ekf`, `Sanitizer`) SHALL hold no persistent
filter state of their own — they carry only configuration / tuning
(or, for `Sanitizer` today, no fields at all).

The trait surfaces SHALL enforce this structurally:

  - `Estimator` trait methods that mutate filter state
    (`predict`, `update_gnss`, `update_baro`, `update_mag`) SHALL
    take `&self` (algorithm config) and `&mut EstimatorState`
    (filter state). Pure-state operations (`init`, `reset`,
    `get_estimate`, `is_initialized`, `has_numeric_fault`,
    `set_state` test-hook) live as inherent methods on
    `EstimatorState`.
  - `ActuatorSanitizer::sanitize` SHALL take `&self` plus
    `&mut ActuatorFallbackState` for the persistent fallback
    counters; the sanitizer itself carries no fallback state.

This is the structural prerequisite for spec §16 hot-spare
takeover: a backup channel inheriting `KernelState` from the
active channel automatically inherits both estimation and
fallback continuity. Without single-ownership, the takeover would
silently lose either the EKF covariance or the per-group
fallback memory.
"""
verification_methods = ["review", "test"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "bfd2157f-2852-4cb3-8ae8-b91d33de23ba"
id = "HLR-STATE-002"
title = "KernelState shape is stable enough to support deterministic encoding"
owner = "aviate-core@aviate"
description = """
The fields of `KernelState` SHALL be either: (a) primitive types
(integers, enums with `#[repr(...)]`); or (b) types that ultimately
reduce to a finite, named field set of primitives. No type that
introduces unspecified ordering, hidden allocation, or non-
deterministic representation (e.g. `HashMap`, `Vec` with implicit
capacity) SHALL be added to `KernelState` without a new derived
requirement (DRQ) explaining the encoding contract.

This is the foreshadowed precondition for Phase 5's
`KernelState::encode_canonical()`: redundant-channel byte equality
requires every field to have a deterministic representation. Phase
3 establishes the structural anchor; Phase 5 implements the
encoding.
"""
verification_methods = ["review"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "190d1f8d-40d0-47cc-9bb7-1b5e210d0802"
id = "HLR-PIPE-001"
title = "Kernel algorithm-identity bundle is a single substitutable surface"
owner = "aviate-core@aviate"
description = """
The kernel SHALL hold its substitutable algorithm objects (estimator,
controller, mixer, sanitizer, envelope protector) inside exactly one
sub-structure (`KernelPipeline<E, V, M, S>`). The kernel SHALL NOT
expose individual top-level fields for any of these — adding a new
substitutable algorithm class (e.g. fault detector, command voter)
requires extending `KernelPipeline` rather than adding a peer field
on `AviateKernelImpl`.

This generalizes SYS-EST-001's substitutability claim from "the
estimator can be swapped" to "the entire algorithm bundle has a
single anchor point." It is the structural prerequisite for
co-substituting algorithm bundles between redundant channels at
startup (peer channels exchange `KernelPipeline` algorithm-identity
hashes; mismatch = firmware drift, refuse to enter lockstep).
"""
verification_methods = ["review", "test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "211a2f8a-493f-4c6c-bf7e-73275154dd54"
id = "HLR-CFG-002"
title = "Configuration is validated once and read-only thereafter"
owner = "aviate-core@aviate"
description = """
The flight kernel SHALL accept resolved configuration only via the
`AviateKernelBuilder` at construction time, OR via `load_config()`
in pre-arm/disarmed states (validation gate; spec §19). Once the
kernel transitions to InitState::Armed, configuration mutation SHALL
be rejected at compile time (no public mutators on
`ResolvedKernelConfig` reachable from the trait surface) AND at run
time (any future internal mutator SHALL gate on `init_state`).

This invariant supports both spec §19 (config integrity) and spec
§16 (redundancy) — runtime mutation would invalidate the cross-
channel byte-equality property of HLR-CFG-001.
"""
verification_methods = ["review", "test"]
traces_to = ["ed45538e-11f2-4887-95c2-91625b4a59cb"]

[[requirements]]
uid = "74314e31-1466-4755-83f3-505dafdaf77b"
id = "HLR-MOD-001"
title = "AviateHal super-trait composes only kernel-relevant surfaces"
owner = "aviate-core@aviate"
description = """
The `aviate_core::hal::AviateHal` super-trait SHALL compose exactly
`SensorHal + ActuatorHal + SystemHal`. Command-framing
(`CommandHal`, `SystemCommand`) and telemetry-transport (`CommHal`,
`CommError`) traits SHALL NOT be members of `AviateHal` and SHALL
NOT be defined in `aviate-core`; they live in `aviate-hal-io` (or
higher-level link crates) and are pulled in via separate trait
bounds by callers that need them.

Adding a new trait family to `AviateHal` requires (a) confirming
the trait is purely sensor/actuator/system, (b) filing a fresh HLR
extending this composition, and (c) re-tracing affected LLRs.
"""
verification_methods = ["review", "test"]
traces_to = ["4207eadd-89b0-4a64-8310-49c336ee057c"]

[[requirements]]
uid = "ef3875e1-eb75-4ad1-968d-5e13fa536548"
id = "HLR-PIPE-002"
title = "KernelPipeline exposes deterministic algorithm-identity hash"
owner = "aviate-core@aviate"
description = """
`KernelPipeline<E, V, M, S>` SHALL expose
`algorithm_identity_hash(&self) -> u64`. The hash SHALL be a pure
function of the four type parameters' compile-time identities (no
contribution from runtime state or per-instance configuration). It
SHALL satisfy: (a) determinism — invocations on independently-
constructed pipelines with identical algorithm-bundle types yield
the same value; (b) bundle-distinctness — swapping any one of the
four type parameters for a structurally-different type yields a
different value with overwhelming probability; (c) within-build
stability — the value is constant across the lifetime of one
firmware build's executions.

The hash is the kernel's contribution to spec §16 lockstep entry:
each channel publishes its hash and refuses peer-lockstep on
mismatch. Algorithm-identity is the orthogonal companion to
configuration byte-equality (HLR-CFG-001) — the two together
witness firmware-bundle agreement at channel boundary.
"""
verification_methods = ["review", "test"]
traces_to = ["d45a87b2-6e51-42b0-995f-a7b6a6a011b9"]
