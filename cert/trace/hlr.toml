[[requirements]]
uid = "c42a507f-d988-4694-b5c3-ed34763fb0f9"
id = "HLR-EST-001"
title = "Estimator trait surface is closed and parameterized over runtime state"
owner = "aviate-core@aviate"
description = """
The `aviate_core::ekf::Estimator` trait SHALL expose exactly:

  - associated type `RuntimeState: EstimatorRuntimeState`
  - `observe(&self, &mut Self::RuntimeState, &SensorSet,
    Option<&SensorOverrides>, Scalar)` — single-cycle entry point
    that drives the estimator forward by `dt` seconds, consuming
    whichever sensor channels the estimator chooses to use.
  - `estimate(&self, &Self::RuntimeState) -> StateEstimate`
  - `reset(&self, &mut Self::RuntimeState)` (default impl: delegates
    to `EstimatorRuntimeState::reset`)
  - test-hooks-gated `inject_state(&self, &mut Self::RuntimeState,
    &StateEstimate)` (default impl: no-op)

The associated `RuntimeState` type lifts the previously-hardcoded
`EkfState` (18-state ESKF + 18×18 P) to a per-implementation choice
— required for non-EKF estimators (MEKF for cubesat ADCS, UKF for
fixed-wing wind augmentation, complementary filter for low-cost
GNSS-denied platforms, particle filter, sliding-window VIO graphs).
Today's only impl (`Ekf`) selects `RuntimeState = EkfState`.

The single `observe()` method replaces the previous
`predict / update_gnss / update_baro / update_mag` quadruple. The
quadruple was EKF-shape (predict-per-IMU + update-per-sensor); the
new shape lets UKF batch updates, particle-filter resampling, and
graph-keyframe triggers fit through the same trait surface. Per-
sensor flow (`predict_state`, `update_gnss_state`, etc.) remains
as inherent helpers on `Ekf` for direct unit-test access — the
kernel calls only `observe()`.

EKF-specific operations that do not generalize to non-Kalman
backends (`init` from raw position/velocity/quaternion, set_state
from a `StateEstimate` summary, `is_initialized`, `has_numeric_fault`)
remain inherent methods on `EkfState`. The kernel's gating logic
reads only `Estimator::estimate(state).quality` and `valid_flags`,
which every implementation must produce.

No additional non-test trait method SHALL be added without filing a
derived requirement (DRQ) and re-tracing affected LLRs.
"""
verification_methods = ["review", "test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "dd494a24-a5f8-4cea-b687-a471edbfea17"
id = "HLR-EST-002"
title = "Estimator quality gates kernel state validity"
owner = "aviate-core@aviate"
description = """
When the estimator reports EstimateQuality::Unusable through
get_estimate(), the kernel SHALL NOT consume the estimate for
control or actuation in the same cycle. Pre-arm checks SHALL
treat is_initialized()==false as blocking. A latched numeric
fault (has_numeric_fault()==true) SHALL prevent arm() from
succeeding until reset() is called.
"""
verification_methods = ["test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "9262663e-c149-424f-b159-2ae3cb176ee7"
id = "HLR-EST-003"
title = "Estimator init is deterministic and bounded-time"
owner = "aviate-core@aviate"
description = """
Estimator::init SHALL complete in a bounded number of CPU cycles
independent of input magnitudes (no iterative convergence, no
recursion). Repeated invocation with identical (pos, vel, quat)
inputs SHALL leave the estimator in identical observable state
(get_estimate() and is_initialized() returning equal values).
predict() and update_*() called before init() SHALL be no-ops
(safety: never propagate from uninitialized state).
"""
verification_methods = ["test", "review"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "4cf7189d-23e6-470a-b71c-c90a81c59970"
id = "HLR-CFG-001"
title = "Resolved kernel configuration is the single source of flight-period truth"
owner = "aviate-core@aviate"
description = """
The kernel SHALL hold flight-period configuration (limits,
mode_config, fault_table, command_timeout_ms, safe_output) in
exactly one structure (`ResolvedKernelConfig`). The kernel SHALL NOT
duplicate any of these values into an additional storage location
during construction or during the flight loop.

The `AviateKernelTrait::get_config()` method SHALL return a borrow of
this single structure; no copies, no shadow caches.
"""
verification_methods = ["review", "test"]
traces_to = ["ed45538e-11f2-4887-95c2-91625b4a59cb"]

[[requirements]]
uid = "589cfa68-0179-4683-a787-0c90a54440df"
id = "HLR-STATE-001"
title = "KernelState is the kernel's runtime mutation surface"
owner = "aviate-core@aviate"
description = """
The kernel's per-cycle mutation paths — `update()`, `init_step()`,
`arm()`, `disarm()`, `ground_reset()`, `request_config_mode()`,
`handle_degradation()` — SHALL mutate kernel state only through
`self.state.<field>` references. The kernel SHALL NOT introduce
parallel state caches (`pipeline.<state>`, `cfg.<state>`, or
top-level shadows) under any future PR without first relocating the
canonical owner inside `KernelState` and filing a new LLR.

When a function reads-and-writes multiple `KernelState` fields in
the same scope, the destructure idiom documented at the head of
`kernel/state.rs` SHALL be applied (see LLR-STATE-103).
"""
verification_methods = ["review", "test"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "33190e76-603e-4cd7-8eee-468bcc94fa10"
id = "HLR-STATE-003"
title = "Every safety-relevant persistent state field has exactly one owner"
owner = "aviate-core@aviate"
description = """
Phase 4 completes the single-owner invariant: in addition to the
seven lifecycle/runtime fields P3 relocated, the persistent EKF
filter state (quat / pos / vel / biases / p_cov / initialized /
quat_fault / last_gyro_body) and persistent sanitizer fallback
state (last_good / age / consecutive_fallback) SHALL live ONLY
inside `KernelState` (as `KernelState.estimator: EstimatorState` and
`KernelState.fallback: ActuatorFallbackState`). The pipeline-side
algorithm objects (`Ekf`, `Sanitizer`) SHALL hold no persistent
filter state of their own — they carry only configuration / tuning
(or, for `Sanitizer` today, no fields at all).

The trait surfaces SHALL enforce this structurally:

  - `Estimator` trait methods that mutate filter state
    (`predict`, `update_gnss`, `update_baro`, `update_mag`) SHALL
    take `&self` (algorithm config) and `&mut EstimatorState`
    (filter state). Pure-state operations (`init`, `reset`,
    `get_estimate`, `is_initialized`, `has_numeric_fault`,
    `set_state` test-hook) live as inherent methods on
    `EstimatorState`.
  - `ActuatorSanitizer::sanitize` SHALL take `&self` plus
    `&mut ActuatorFallbackState` for the persistent fallback
    counters; the sanitizer itself carries no fallback state.

This is the structural prerequisite for spec §16 hot-spare
takeover: a backup channel inheriting `KernelState` from the
active channel automatically inherits both estimation and
fallback continuity. Without single-ownership, the takeover would
silently lose either the EKF covariance or the per-group
fallback memory.
"""
verification_methods = ["review", "test"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "bfd2157f-2852-4cb3-8ae8-b91d33de23ba"
id = "HLR-STATE-002"
title = "KernelState shape is stable enough to support deterministic encoding"
owner = "aviate-core@aviate"
description = """
The fields of `KernelState` SHALL be either: (a) primitive types
(integers, enums with `#[repr(...)]`); or (b) types that ultimately
reduce to a finite, named field set of primitives. No type that
introduces unspecified ordering, hidden allocation, or non-
deterministic representation (e.g. `HashMap`, `Vec` with implicit
capacity) SHALL be added to `KernelState` without a new derived
requirement (DRQ) explaining the encoding contract.

This is the foreshadowed precondition for Phase 5's
`KernelState::encode_canonical()`: redundant-channel byte equality
requires every field to have a deterministic representation. Phase
3 establishes the structural anchor; Phase 5 implements the
encoding.
"""
verification_methods = ["review"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "190d1f8d-40d0-47cc-9bb7-1b5e210d0802"
id = "HLR-PIPE-001"
title = "Kernel algorithm-identity bundle is a single substitutable surface"
owner = "aviate-core@aviate"
description = """
The kernel SHALL hold its substitutable algorithm objects (estimator,
controller, mixer, sanitizer, envelope protector) inside exactly one
sub-structure (`KernelPipeline<E, V, M, S>`). The kernel SHALL NOT
expose individual top-level fields for any of these — adding a new
substitutable algorithm class (e.g. fault detector, command voter)
requires extending `KernelPipeline` rather than adding a peer field
on `AviateKernelImpl`.

This generalizes SYS-EST-001's substitutability claim from "the
estimator can be swapped" to "the entire algorithm bundle has a
single anchor point." It is the structural prerequisite for
co-substituting algorithm bundles between redundant channels at
startup (peer channels exchange `KernelPipeline` algorithm-identity
hashes; mismatch = firmware drift, refuse to enter lockstep).
"""
verification_methods = ["review", "test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "211a2f8a-493f-4c6c-bf7e-73275154dd54"
id = "HLR-CFG-002"
title = "Configuration is validated once and read-only thereafter"
owner = "aviate-core@aviate"
description = """
The flight kernel SHALL accept resolved configuration only via the
`AviateKernelBuilder` at construction time, OR via `load_config()`
in pre-arm/disarmed states (validation gate; spec §19). Once the
kernel transitions to InitState::Armed, configuration mutation SHALL
be rejected at compile time (no public mutators on
`ResolvedKernelConfig` reachable from the trait surface) AND at run
time (any future internal mutator SHALL gate on `init_state`).

This invariant supports both spec §19 (config integrity) and spec
§16 (redundancy) — runtime mutation would invalidate the cross-
channel byte-equality property of HLR-CFG-001.
"""
verification_methods = ["review", "test"]
traces_to = ["ed45538e-11f2-4887-95c2-91625b4a59cb"]

[[requirements]]
uid = "74314e31-1466-4755-83f3-505dafdaf77b"
id = "HLR-MOD-001"
title = "AviateHal super-trait composes only kernel-relevant surfaces"
owner = "aviate-core@aviate"
description = """
The `aviate_core::hal::AviateHal` super-trait SHALL compose exactly
`SensorHal + ActuatorHal + SystemHal`. Command-framing
(`CommandHal`, `SystemCommand`) and telemetry-transport (`CommHal`,
`CommError`) traits SHALL NOT be members of `AviateHal` and SHALL
NOT be defined in `aviate-core`; they live in `aviate-hal-io` (or
higher-level link crates) and are pulled in via separate trait
bounds by callers that need them.

Adding a new trait family to `AviateHal` requires (a) confirming
the trait is purely sensor/actuator/system, (b) filing a fresh HLR
extending this composition, and (c) re-tracing affected LLRs.
"""
verification_methods = ["review", "test"]
traces_to = ["4207eadd-89b0-4a64-8310-49c336ee057c"]

[[requirements]]
uid = "ef3875e1-eb75-4ad1-968d-5e13fa536548"
id = "HLR-PIPE-002"
title = "KernelPipeline exposes deterministic algorithm-identity hash"
owner = "aviate-core@aviate"
description = """
`KernelPipeline<E, V, M, S>` SHALL expose
`algorithm_identity_hash(&self) -> u64`. The hash SHALL be a pure
function of the four type parameters' compile-time identities (no
contribution from runtime state or per-instance configuration). It
SHALL satisfy: (a) determinism — invocations on independently-
constructed pipelines with identical algorithm-bundle types yield
the same value; (b) bundle-distinctness — swapping any one of the
four type parameters for a structurally-different type yields a
different value with overwhelming probability; (c) cross-build
stability — the value is a function of compile-time `ALGORITHM_ID`
constants declared at each impl site, so it is constant across
Rust compiler versions, target triples, and optimization levels.

The hash is the kernel's contribution to spec §16 lockstep entry:
each channel publishes its hash and refuses peer-lockstep on
mismatch. Algorithm-identity is the orthogonal companion to
configuration byte-equality (HLR-CFG-001) — the two together
witness firmware-bundle agreement at channel boundary.
"""
verification_methods = ["review", "test"]
traces_to = ["d45a87b2-6e51-42b0-995f-a7b6a6a011b9"]

[[requirements]]
uid = "aca86b74-33ba-4bda-8b95-e2df7167a250"
id = "HLR-CTL-002"
title = "VehicleController exposes pluggable runtime state via associated type"
owner = "aviate-core@aviate"
description = """
The `VehicleController` trait SHALL declare an associated type
`RuntimeState: ControllerRuntimeState`. Each implementor selects
its own runtime-state type — gains-only controllers use the
zero-size `NoControllerState` sentinel; controllers with cross-
frame memory (rate-loop integrators, anti-windup accumulators,
derivative-filter histories, command slew limiters, mode latches,
VTOL transition-blend coefficients, fixed-wing energy-loop state)
declare a struct that implements `ControllerRuntimeState`.

The runtime-state instance lives in `KernelState.control` (single-
owner invariant HLR-STATE-003), is mutated only via the kernel-
mediated `controller.step(&mut state.control, ...)` call, and is
cleared by `controller.reset(&mut state.control)` on
`ground_reset` / `disarm`. This makes controller persistent state
amenable to the same snapshot / hash / vote / hot-spare-takeover
machinery as `EstimatorState` and `ActuatorFallbackState`.

The associated-type design is a deliberate refusal to promise
"controllers are forever stateless": real flight controllers grow
integrators and transition logic. Picking the trait shape today
that accommodates that growth (without a second refactor) is the
whole point.
"""
verification_methods = ["review", "test"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "9f335eda-4a07-4d8c-93db-63ad0c483184"
id = "HLR-PIPE-003"
title = "Substitutable algorithm trait surfaces are exercised end-to-end"
owner = "aviate-core@aviate"
description = """
The four substitutable algorithm trait surfaces (Estimator,
VehicleController, Mixer, ActuatorSanitizer) SHALL each be
exercised by at least one non-default implementation in the
crate's integration-test suite, end-to-end through a full
`AviateKernelImpl::update()` cycle. "End-to-end" means the test
constructs the kernel with the non-default impl, drives `update()`
to completion without panic, and observes — through trait-
internal counters or sentinels — that the trait method bodies were
actually entered (proving the kernel performs trait dispatch
rather than coincidentally bypassing the substitutable path).

Rationale: `KernelPipeline<E, V, M, S>` (HLR-PIPE-001) asserts the
algorithm bundle is composable at compile time. This HLR is the
behavioral analogue — *substitutability is also exercised at run
time*. Without this, a future change to `kernel_update.rs` could
inline a concrete type (e.g. `&self.pipeline.estimator` cast to
`&Ekf`) and the trait dispatch claim would silently weaken; the
mock-pipeline tests are the structural witness against that
regression.

Completion sign for the Phase-0 plan: replacing any one of the
four traits' implementations does not require a touch to any
internal kernel module.
"""
verification_methods = ["test"]
traces_to = ["bb2e1695-a2e7-40c4-ae75-9711a8134b70"]

[[requirements]]
uid = "a64c0403-5284-4072-bd7d-1b542f97e6dd"
id = "HLR-REPL-001"
title = "Kernel state types produce deterministic canonical byte encodings"
owner = "aviate-core@aviate"
description = """
Spec §16 cross-channel snapshot replication, voting, and hot-spare
takeover require every safety-relevant runtime state field to
produce a byte-identical canonical encoding across redundant
channels. The kernel SHALL define a `Replicable` trait
(`aviate_core::replicable`) that pins the contract:

  - Each implementor declares `const ENCODED_LEN: usize` — a
    compile-time constant giving the exact byte count of the
    encoded form. A peer channel uses this to allocate its receive
    buffer at startup.
  - `encode_canonical(&self, &mut [u8]) -> usize` writes exactly
    `Self::ENCODED_LEN` bytes (or `min(buf.len(),
    Self::ENCODED_LEN)` if the caller's buffer is smaller) and
    returns the byte count. Width is fixed regardless of state
    value — a value-dependent variable-length encoding would
    defeat byte-equality comparison.
  - Two byte-equal states produce byte-equal encodings; mutating
    any field changes at least one byte of the encoding.
  - Floats use `to_le_bytes` (target-endian-independent, NaN bit
    patterns preserved). Booleans encode as a single byte (1/0).
    Enums encode as a tag byte plus payload.

`EstimatorRuntimeState` and `ControllerRuntimeState` SHALL extend
`Replicable` (super-trait bound). Every implementor — `EkfState`,
`NoControllerState`, future MEKF / UKF / particle-filter runtime
types, future controller integrator / anti-windup state — SHALL
provide `Replicable`. This makes `KernelState` recursively
encodable: a future `KernelState::encode_canonical` (Phase-5)
walks the fields and concatenates their canonical bytes.

This requirement is the structural prerequisite for spec §16
hot-spare takeover and cross-channel divergence detection.
"""
verification_methods = ["test", "review"]
traces_to = ["d6ca85b4-62d1-48d0-b16e-3415904cc604"]

[[requirements]]
uid = "fa9b3c0e-7d54-4e1f-b9b2-43c5d8a1f723"
id = "HLR-RTM-001"
title = "aviate-runtime env-* features are mutually exclusive at compile time"
owner = "aviate-runtime@aviate"
description = """
`aviate-runtime` SHALL gate sandbox-transport modules
(`sensor_cache`, `sim`, `telemetry`, `validation`) and the
`aviate-hal-xil` dependency behind the `env-sitl` / `env-hitl`
features. The `env-flight` feature SHALL NOT enable any of those.
Exactly one of `env-flight` / `env-sitl` / `env-hitl` SHALL be
enabled per build; `env-flight` SHALL be mutually exclusive with
the other two. The constraint SHALL be enforced at compile time
via `compile_error!`, not by build-system or configuration
discipline (which is reviewable but not gate-able).

Together with the boundary file's `in_scope` listing of
`aviate-runtime`, this requirement makes the "flight build is
DO-178C-clean" claim a structural property of the source rather
than a user-followed convention.
"""
verification_methods = ["review", "test"]
traces_to = ["8f3a2c87-9d4e-4a1f-b7e2-3c6a8f1d9e02"]

[[requirements]]
uid = "be4f7d29-3a82-4c6e-9b2f-7e1c5d8a0f43"
id = "HLR-CCS-001"
title = "Kernel projects single-channel snapshot for cross-channel agreement"
owner = "aviate-core@aviate"
description = """
The flight kernel SHALL expose a `project_for_cross_channel`
method that produces a `ChannelSnapshot` carrying:

  - the producing channel's `ChannelId`;
  - that channel's cycle sequence number;
  - the `KernelPipeline::algorithm_identity_hash()` value
    (HLR-PIPE-002);
  - the `ResolvedKernelConfig::canonical_hash()` value
    (HLR-CFG-001);
  - the canonical bytes of the channel's `KernelState`
    (HLR-REPL-001).

The first four fields are scalar; the fifth borrows from a
caller-owned buffer (no allocation, no_std-friendly). Two
snapshots from peer channels SHALL be byte-comparable: if the
algorithm-identity hashes match AND the config hashes match AND
the state bytes are length-equal AND byte-equal, the snapshots
`agrees_with` each other. Channel ID and cycle sequence are NOT
part of the agreement check — peers run cycles on their own
clocks and have distinct IDs by definition.

The agreement triple (algorithm, config, state) covers three
orthogonal concerns at the gate: WHICH CODE is running, WHICH
TUNING that code is using, WHICH STATE that code holds. A
mismatch in any of the three SHALL block lockstep entry.

This requirement is the structural projection layer for spec §16
lockstep entry; HLR-CCS-002 covers the comparison gate that
consumes these snapshots.
"""
verification_methods = ["test", "review"]
traces_to = ["d45a87b2-6e51-42b0-995f-a7b6a6a011b9"]

[[requirements]]
uid = "fc8e3a1d-5b9f-4e27-a4c6-2f8d1e7b3c50"
id = "HLR-CCS-002"
title = "Lockstep entry is gated on per-cycle peer-snapshot agreement"
owner = "aviate-core@aviate"
description = """
A peer-lockstep gate SHALL consume the local channel's
`ChannelSnapshot` and the peer set's `ChannelSnapshot`s and
return one of:

  - Enter — quorum of peers present, all agree byte-equally;
  - RefuseHashMismatch — at least one peer's
    `algorithm_identity_hash` differs from local (firmware
    bundle skew);
  - RefuseStateMismatch — algorithm hashes agree but state
    bytes differ (state divergence);
  - RefuseQuorum — fewer peers present than the caller-
    specified quorum requires.

The decision SHALL be a fail-stop single-pass check: hash
mismatch takes precedence over state mismatch within a single
peer; first-disagreement-wins across peers (no "majority
overrules"). `RefuseQuorum` SHALL be returned without
inspecting peer agreement — absence of evidence is its own
refuse outcome, distinct from disagreement.

This requirement is the gate-on-mismatch layer paired with
HLR-CCS-001 (the projection layer): together they witness
spec §16 cross-channel firmware verification + state
agreement, with no "different binary, same hash" or "same
binary, divergent state" attack surface left open.
"""
verification_methods = ["test", "review"]
traces_to = ["d45a87b2-6e51-42b0-995f-a7b6a6a011b9"]
