id = "LLR-CTL-102"
title = "VehicleController step takes &mut Self::RuntimeState"
owner = "aviate-core@aviate"
description = """
`VehicleController::step` SHALL have the signature

  fn step(
      &self,
      runtime: &mut Self::RuntimeState,
      state: &StateEstimate,
      command: &Command,
      mode: ConfigMode,
      limits: &Limits,
  ) -> AxisCommand;

with `type RuntimeState: ControllerRuntimeState`. The kernel
SHALL invoke this as
`self.pipeline.controller.step(&mut self.state.control, ...)`,
producing a disjoint borrow against other `KernelState` fields
read from the call site (`self.state.mode`, `self.state.estimator`
projections — all `Copy` or independently-borrowed sub-fields).

The trait SHALL also expose
`fn reset(&self, runtime: &mut Self::RuntimeState)` with a default
implementation that delegates to `runtime.reset()`. The kernel
SHALL invoke `controller.reset(&mut state.control)` from
`ground_reset` (LLR-STATE-107).
"""
