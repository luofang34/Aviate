[[requirements]]
uid = "57835534-5fc0-45a2-92b9-6920328193e5"
id = "LLR-STATE-107"
title = "ground_reset clears every safety-relevant runtime field"
owner = "aviate-core@aviate"
description = """
`AviateKernelImpl::ground_reset()` SHALL clear every field of
`KernelState` that holds runtime/safety state, not just the
lifecycle-machine cursor and fault latch. Specifically:

  - `init_state` → `InitState::ConfigLoading` (re-enter init)
  - `faults` → empty
  - `control_law` → `Primary`
  - `mode` → `ConfigMode::Hover`
  - `checks.{pre_arm, in_flight, transition}` → reset
  - `estimator` → `EstimatorState::default()` via `reset()`
  - `fallback` → `ActuatorFallbackState::default()` (sanitizer
     memory: last_good / age / consecutive_fallback per group)
  - `actuator_state` → `ActuatorState::default()`
    (cached commanded-actuator snapshot)
  - `timing_stats` → `TimingStats::default()`

Pre-Phase-4-followup, `fallback`, `actuator_state`, `timing_stats`,
and `mode` were silently inherited across reset — a hot-spare
takeover or post-fault re-init would leak prior sanitizer last-good
memory and previous commanded-actuator snapshots into the
post-reset cycle. This requirement closes that gap.
"""
verification_methods = ["test"]
modules = ["aviate-core/src/kernel_logic.rs"]
derived = false
traces_to = ["33190e76-603e-4cd7-8eee-468bcc94fa10"]

[[requirements]]
uid = "ad5ab2d7-0dd4-48d0-83ae-dea20934c119"
id = "LLR-CTL-101"
title = "VehicleController separates algorithm identity from runtime state and resets on prescribed transitions"
owner = "aviate-core@aviate"
description = """
The `VehicleController::step` trait method SHALL take BOTH:

  - `&self` — algorithm identity (firmware-constant gains for
    today's gains-only impls). Read-only across the flight loop;
    lives inside `KernelPipeline`. **Tunable** parameters
    (operator-adjustable PID gains, mode thresholds) belong in
    `ResolvedKernelConfig`, not on the controller struct, because
    spec §16 lockstep requires byte-equal config across channels
    (HLR-CFG-001). Today's example controllers hold their P-only
    gains on `Self` as a transitional placeholder; DRQ-CTL-001
    tracks moving them into `ResolvedKernelConfig.controller_gains`.
  - `&mut Self::RuntimeState` — persistent runtime state
    (integrators, anti-windup, filter memories, mode latches,
    transition-blend coefficients; lives inside
    `KernelState.controller`).

Implementors SHALL NOT hold safety-relevant persistent state on
`Self` (the algorithm side). Any cross-frame memory the
controller needs SHALL route through `Self::RuntimeState`, which
is owned by `KernelState` and therefore covered by the kernel's
single-state-owner invariant (HLR-STATE-003).

The kernel SHALL invoke
`controller.reset(&mut state.controller)` on every transition
that invalidates accumulated controller memory:

  1. `ground_reset()` — back-to-factory init.
  2. `disarm()` — flight period ended; preserved integrators
     would seed the next arm with stale authority.
  3. `check_critical_faults()` — entering `InitState::Fault`;
     prior law's accumulators were computed against state we now
     consider invalid.
  4. `handle_degradation()` when the new control law is
     `ControlLawV1::Backup` — Backup's authority envelope and
     available actuator surface differ from Primary, so prior
     accumulators must not leak. Transitions to `Alternate`
     SHALL NOT reset (Alternate retains the same actuator
     surface; resetting would worsen tracking transients).

This is the analogue of LLR-STATE-105 (Estimator) and
LLR-STATE-106 (ActuatorSanitizer) for the control-law layer:
algorithm-identity in the pipeline, persistent state in
`KernelState`. The split is structural — the trait surface
mirrors the data-flow contract.
"""
verification_methods = ["review", "test"]
modules = [
    "aviate-core/src/control.rs",
    "aviate-core/src/control/multirotor.rs",
    "aviate-core/src/control/fixed_wing.rs",
    "aviate-core/src/control/vtol.rs",
]
derived = false
traces_to = ["190d1f8d-40d0-47cc-9bb7-1b5e210d0802"]

[[requirements]]
uid = "3601601c-808b-453d-ae41-d6493409fd5e"
id = "LLR-CMD-101"
title = "update() plumbs command_age_ms into the in-flight staleness gate"
owner = "aviate-core@aviate"
description = """
`AviateKernelImpl::update()` and `AviateKernelTrait::update()` SHALL
accept a caller-supplied `command_age_ms: u32` parameter measuring
the staleness of `command` against the caller's timebase. The kernel
SHALL forward this value into
`KernelChecks.in_flight.update_command_status(command_age_ms,
self.cfg.command_timeout_ms)` — the `COMMAND_RECENT` flag SHALL be
set iff `command_age_ms < self.cfg.command_timeout_ms`.

Pre-Phase-4-followup, the kernel hardcoded
`update_command_status(0, ...)`, leaving `command_timeout_ms`
decorative — the safety gate (spec §12) for stale RC/GCS commands
never fired regardless of the configured threshold. This LLR
closes that gap.

Callers that don't yet track command-frame arrival timestamps
(SITL runtime, current board HALs) pass `0` and document the
freshness-tracking gap as a Phase-5 prerequisite.
"""
verification_methods = ["test"]
modules = [
    "aviate-core/src/kernel_update.rs",
    "aviate-core/src/kernel_trait.rs",
    "aviate-core/src/checks/in_flight.rs",
]
derived = false
traces_to = ["dd494a24-a5f8-4cea-b687-a471edbfea17"]

