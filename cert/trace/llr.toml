uid = "6801bdd2-3f0d-43cb-895e-be48b82cf098"
id = "LLR-REPL-104"
title = "KernelState::encode_canonical walks every field"
owner = "aviate-core@aviate"
description = """
`KernelState<E, R>: Replicable` SHALL encode each field in
declaration order and SHALL include the contributions of both
generic state parameters:

    init_state + mode + faults + control_law + checks +
    actuator_state + timing_stats + estimator (E) +
    fallback + controller (R)

`<KernelState<E, R> as Replicable>::ENCODED_LEN` SHALL be a
compile-time constant equal to the sum of every field type's
`ENCODED_LEN`. The associated-type contributions of `E` and `R`
make the snapshot size flex with the chosen estimator and
controller — `EkfState + NoControllerState` produces a 2203-byte
snapshot today; a future MEKF estimator with a different state
shape produces a different size, but the encoding rule is the
same.

`encode_canonical` SHALL use a step-and-advance pattern: each
field writes its bytes into the remaining buffer slice and the
cursor advances by the byte count returned. If the caller's
buffer runs out mid-encoding, subsequent steps clamp to zero
(via `ByteWriter`), and the returned count tells the caller how
much actually landed — the lockstep byte-equality check then
fails downstream rather than corrupting memory.
"""
