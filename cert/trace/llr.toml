[[requirements]]
uid = "814741c8-ed9d-40c5-8646-0c01b62de7d1"
id = "LLR-CTL-103"
title = "ControllerRuntimeState trait + NoControllerState sentinel"
owner = "aviate-core@aviate"
description = """
The `ControllerRuntimeState` trait in
`aviate-core::control::runtime` SHALL declare:

  pub trait ControllerRuntimeState: Default + Clone + core::fmt::Debug {
      fn reset(&mut self);
  }

Trait bounds:
  - `Default` — `KernelState::new` / `KernelState::default()`
    construct `controller: R::default()`; also seeds `reset`
    baselines for impls that delegate to `*self = Self::default()`.
  - `Clone` — Phase-5 prerequisite. Cross-channel snapshot
    replication (HLR-STATE-003) requires `KernelState: Clone`,
    which transitively requires every field to be `Clone`.
    Adding the bound now avoids a future re-bounding sweep.
  - `Debug` — `KernelState` derives `Debug` for diagnostic dumps
    (`tracing` events, post-mortem panics in tests).

The `reset` method SHALL return the runtime state to its post-
power-on baseline without re-allocation.

The crate SHALL provide a unit-struct sentinel
`pub struct NoControllerState;` that implements
`ControllerRuntimeState` (with a no-op `reset`) and derives
`Default + Clone + Copy + Debug + PartialEq + Eq`.
`NoControllerState` SHALL be the
`type RuntimeState` selection of every gains-only
`VehicleController` impl in this crate
(`MultirotorController`, `FixedWingController`,
`VtolController`).
"""
verification_methods = ["review", "test"]
modules = ["aviate-core/src/control/runtime.rs"]
derived = false
traces_to = ["aca86b74-33ba-4bda-8b95-e2df7167a250"]

[[requirements]]
uid = "a8fa2869-f205-40ec-9b99-342488ca75e4"
id = "LLR-STATE-108"
title = "KernelState owns controller runtime state via parameterization"
owner = "aviate-core@aviate"
description = """
`KernelState<R: ControllerRuntimeState = NoControllerState>` SHALL
declare a `pub controller: R` field. `AviateKernelImpl<E, V, M, S>`
SHALL wire `state: KernelState<V::RuntimeState>`, so the kernel's
controller runtime state is owned by `KernelState` (single-owner
invariant HLR-STATE-003) and indexed by the controller's
associated type.

Field name is `controller` (not `control`) to disambiguate from
the sibling `control_law` field — kernel code that touches both
in the same scope is otherwise prone to mis-typing one for the
other.

The `Default` type-parameter pin to `NoControllerState` keeps
existing call sites that say `KernelState::default()` working
without explicit type arguments (gains-only controller path).
Adding a stateful controller activates `KernelState<MyState>`
through `AviateKernelImpl`'s `V::RuntimeState` projection — no
separate KernelState constructor needed.
"""
verification_methods = ["review", "test"]
modules = ["aviate-core/src/kernel/state.rs", "aviate-core/src/kernel.rs"]
derived = false
traces_to = ["589cfa68-0179-4683-a787-0c90a54440df"]
