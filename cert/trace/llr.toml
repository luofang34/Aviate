id = "LLR-EST-106"
title = "Estimator::get_estimate returns a coherent StateEstimate snapshot"
owner = "aviate-core@aviate"
description = """
get_estimate SHALL return a StateEstimate whose attitude/angular
velocity/position-NED/velocity-NED fields reflect the filter's
current state, whose quality is Good iff is_initialized() == true
and Unusable otherwise, and whose valid_flags is StateValidFlags::all()
iff is_initialized() == true and empty otherwise. get_estimate
SHALL be pure (no state mutation).
"""
