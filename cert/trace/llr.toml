[[requirements]]
uid = "edbab6c9-f097-45ed-8c5a-10f3e2d4fce1"
id = "LLR-STATE-105"
title = "Estimator trait surface separates algorithm from state"
owner = "aviate-core@aviate"
description = """
The `Estimator` trait SHALL expose only mutation methods that route
filter state through their argument list:
`predict(&self, state: &mut EstimatorState, imu, dt)`,
`update_gnss(&self, state: &mut EstimatorState, gnss)`,
`update_baro(&self, state: &mut EstimatorState, baro)`,
`update_mag(&self, state: &mut EstimatorState, mag)`.

Pure-state operations (`init`, `reset`, `get_estimate`,
`is_initialized`, `has_numeric_fault`, and the test-hooks-gated
`set_state`) SHALL live as inherent methods on `EstimatorState`,
not on the trait — they need no algorithm identity to evaluate.

The `Ekf` implementor SHALL hold only `EkfConfig` (tuning) — no
persistent filter state. `Ekf { config: EkfConfig }`.
"""
verification_methods = ["review", "test"]
modules = ["aviate-core/src/ekf.rs", "aviate-core/src/ekf/scalar.rs"]
derived = false
traces_to = ["33190e76-603e-4cd7-8eee-468bcc94fa10"]

