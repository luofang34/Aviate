[[requirements]]
uid = "4e701d6e-9254-41bb-97f1-1c4b3da812ec"
id = "LLR-STATE-103"
title = "KernelState supports field-level borrow destructuring"
owner = "aviate-core@aviate"
description = """
`KernelState` field declarations SHALL be `pub` so that callers
needing concurrent &mut/& borrows of distinct fields can use
struct-destructure pattern matching:
`let KernelState { ref mut checks, ref actuator_state, .. } =
self.state;`. The module-level documentation at the head of
`kernel/state.rs` SHALL describe this idiom as the recommended
pattern for functions that read-and-write multiple state fields.

Rationale: Rust's borrow checker treats `&mut self.state.X` and
`&self.state.Y` as conflicting borrows of `self.state` even when
`X != Y`. Destructure-on-entry surfaces the field-level borrow
pattern unambiguously and makes accidental whole-struct aliasing a
compile error rather than a runtime issue.
"""
verification_methods = ["review"]
modules = ["aviate-core/src/kernel/state.rs"]
derived = false
traces_to = ["589cfa68-0179-4683-a787-0c90a54440df"]

