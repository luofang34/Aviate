id = "LLR-EST-108"
title = "Estimator::reset returns the filter to factory un-initialized state"
owner = "aviate-core@aviate"
description = """
reset() SHALL clear all integrated state (position, velocity,
attitude, biases), clear any latched numeric fault, restore
covariance to the construction-time default, set is_initialized()
back to false, and preserve the originally-supplied tuning
configuration. reset() SHALL be safe to call from any kernel
state and SHALL NOT panic.
"""
