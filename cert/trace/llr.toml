[[requirements]]
uid = "7e3f1a8c-9d6b-4e29-a1f7-3b8d5e2c4a06"
id = "LLR-CCS-101"
title = "ChannelSnapshot struct carries id, seq, hash, and borrowed state bytes"
owner = "aviate-core@aviate"
description = """
`aviate_core::kernel::snapshot::ChannelSnapshot<'a>` SHALL be a
struct with exactly four fields:

  - `channel_id: ChannelId`
  - `cycle_seq: u64`
  - `algorithm_identity_hash: u64`
  - `state_bytes: &'a [u8]`

The lifetime `'a` ties the snapshot to a caller-owned buffer; if
that buffer is mutated, the borrow checker invalidates the
snapshot at compile time. The struct SHALL implement `Clone +
Debug` and SHALL NOT implement `Copy` (the borrowed slice's
lifetime makes Copy semantically wrong).
"""
