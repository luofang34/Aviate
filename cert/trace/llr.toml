[[requirements]]
uid = "421bab25-b06e-4804-9beb-ea939ae5b79a"
id = "LLR-PIPE-103"
title = "algorithm_identity_hash folds FNV-1a over the four ALGORITHM_ID constants"
owner = "aviate-core@aviate"
description = """
`KernelPipeline::<E, V, M, S>::algorithm_identity_hash` SHALL be
implemented as 64-bit FNV-1a (offset basis 0xcbf29ce484222325,
prime 0x00000100000001b3) folded over the four traits' compile-
time `ALGORITHM_ID` constants encoded as little-endian u64s, in
the positional order (E::ALGORITHM_ID, V::ALGORITHM_ID,
M::ALGORITHM_ID, S::ALGORITHM_ID). Positional ordering is part
of the hash — swapping any two impls changes the output even
when the participating constants are unchanged. The function
SHALL NOT read `self`'s fields and SHALL NOT consult any runtime
configuration. The function SHALL NOT panic and SHALL be
`#[inline]`-eligible (no allocation, no I/O, no locking).

Because every input is a compile-time `u64` constant declared at
the impl site, the hash is stable across compiler versions,
target triples, and optimization levels — strictly stronger than
the prior `core::any::type_name`-based derivation, which was
best-effort and only stable within a single build.
"""
