[[requirements]]
uid = "bb2e1695-a2e7-40c4-ae75-9711a8134b70"
id = "SYS-EST-001"
title = "State estimator is replaceable"
owner = "aviate-core@aviate"
description = """
The Aviate flight kernel SHALL accept an externally-supplied state
estimator implementation. Alternate algorithms (e.g. UKF, Invariant-EKF,
factor-graph backends) SHALL be substitutable without modifying kernel
control flow, the AviateKernelTrait surface (spec §20), or any
non-estimator subsystem (controller, mixer, sanitizer, envelope
protector). Substitution SHALL preserve the safety properties listed
in spec §21 (Architecture Invariants).
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "d6ca85b4-62d1-48d0-b16e-3415904cc604"
id = "SYS-STATE-001"
title = "Kernel runtime state has a single, observable owner"
owner = "aviate-core@aviate"
description = """
The flight kernel's runtime state — lifecycle (init/arm/disarm/fault),
current configuration mode, fault flag latch, control law authority,
gate-check state, cached actuator snapshot, and per-cycle timing
statistics — SHALL be held in exactly one structure (`KernelState`).
The kernel SHALL NOT shadow any of these fields elsewhere on
`AviateKernelImpl` or duplicate them into the pipeline or config
sub-structs.

This is the structural prerequisite for redundancy and replay (spec
§16, §17): Phase 5's `ChannelSnapshot` projection takes a borrow of
`KernelState` and produces the byte sequence redundant channels
exchange. With multiple owners, the projection would be ill-defined.

Phase 4 will additionally relocate EKF persistent state (quaternion,
position, velocity, biases, covariance) and sanitizer fallback state
(last-good vectors, age, consecutive-fallback counters) into
`KernelState`, at which point "every safety-relevant persistent
state field has exactly one owner" holds for the entire kernel —
not just the lifecycle slice this requirement covers.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "ed45538e-11f2-4887-95c2-91625b4a59cb"
id = "SYS-CFG-001"
title = "Flight-period kernel configuration is immutable"
owner = "aviate-core@aviate"
description = """
The set of kernel parameters that govern flight envelope, fault
handling, command-staleness threshold, per-mode actuator group
configuration, and last-ditch safe output (spec §13, §15.2, §12, §4,
§9, §10.5) SHALL be validated and resolved exactly once during kernel
construction and SHALL NOT be mutated during the flight loop. Lockstep
or backup channels comparing equality of these parameters at startup
SHALL deterministically detect firmware/tuning drift between channels.

This requirement is the structural precondition for spec §16
(redundancy) — without a single immutable configuration source per
channel, byte-for-byte equality across redundant channels is not
expressible.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "4207eadd-89b0-4a64-8310-49c336ee057c"
id = "SYS-MOD-001"
title = "Kernel HAL surface excludes link-layer concerns"
owner = "aviate-core@aviate"
description = """
Per spec §2.2 the flight kernel's external surface is sensor input,
actuator output, and system services (time, watchdog, reboot,
bootloader). Command framing, command transport, and telemetry
framing are link-layer concerns and SHALL NOT appear in the
`aviate-core` crate. Crates that drive radio links, serial framing,
or GCS protocols depend on `aviate-hal-io` (or higher-level link
crates) for these surfaces; `aviate-core` itself depends only on
sensor/actuator/system traits.

This invariant bounds the kernel's certification blast radius: the
kernel's compile-time dependency closure cannot be expanded by
dropping a link-protocol abstraction into `aviate-core` and is the
structural prerequisite for keeping the DAL-A boundary aligned with
spec §2.2.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "d45a87b2-6e51-42b0-995f-a7b6a6a011b9"
id = "SYS-PIPE-001"
title = "Pipeline algorithm-bundle identity is queryable"
owner = "aviate-core@aviate"
description = """
The flight kernel SHALL expose a deterministic 64-bit identity
witness for its substitutable algorithm bundle (estimator, vehicle
controller, mixer, sanitizer). Two independently-built channels
running byte-identical firmware SHALL compute the same witness;
distinct algorithm bundles SHALL compute distinct witnesses with
high probability.

This requirement is the structural precondition for spec §16
cross-channel firmware verification: peer channels exchange the
witness at lockstep entry and refuse lockstep on mismatch (firmware
drift detection). The witness covers algorithm *identity* — pairing
it with HLR-CFG-001 (configuration byte-equality) closes the
"different binary, same hash" attack surface.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "8f3a2c87-9d4e-4a1f-b7e2-3c6a8f1d9e02"
id = "SYS-RTM-001"
title = "Flight runtime is inside the certification boundary"
owner = "aviate-runtime@aviate"
description = """
The Aviate flight runtime (`aviate-runtime`) SHALL be in scope of
the DO-178C boundary when built with its `env-flight` feature. The
crate SHALL NOT, under that feature, depend on any sandbox
transport, simulator harness, or development tool that is itself
out of scope.

Sandbox transports (SITL/HITL via `aviate-hal-xil`) remain available
through the `env-sitl` / `env-hitl` features for development and
verification harnesses. Those features SHALL be mutually exclusive
with `env-flight` so a flight image cannot accidentally pull a
sandbox dependency in. The mutual exclusion is enforced at compile
time, not by configuration discipline; see HLR-RTM-001 for the
contract and LLR-RTM-101 for the mechanism.

Inclusion in the boundary closes the long-standing gap where the
"Aviate kernel is DO-178C-aimed" claim was honest only for
`aviate-core` and adjacent crates, while the actual control loop
(scheduling, runner state machine, board wiring) sat in sandbox.
"""
verification_methods = ["review"]
traces_to = []

[[requirements]]
uid = "af89dde4-4c9a-4e6d-a7a9-5bb2447a58d1"
id = "SYS-EST-002"
title = "Estimator delivers bounded state error in nominal flight"
owner = "aviate-core@aviate"
description = """
When sensors are reporting `Healthy` and the vehicle is operating
inside the configured flight envelope (spec §13), the kernel's
state estimator SHALL produce attitude, angular rate, position, and
velocity estimates whose error against ground truth stays inside
implementation-defined bounds for the duration of the flight. The
bounds are recorded at the HLR layer (see HLR-EST-201..203) and
become test pass/fail thresholds.

This is the behavioral complement to SYS-EST-001 (replaceability):
SYS-EST-001 says the kernel does not care which algorithm produces
the estimate; SYS-EST-002 says whichever algorithm is loaded must
meet the numerical accuracy contract or be rejected at integration
time.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "6f3eb555-3636-48b4-90f2-5d11abfcaa54"
id = "SYS-CTL-001"
title = "Stabilization closes the control loop within authority and time bounds"
owner = "aviate-core@aviate"
description = """
The kernel's vehicle controller SHALL track rate setpoints,
attitude setpoints, and (when the active control law commands it)
position setpoints with steady-state error and transient response
inside implementation-defined bounds, while never producing axis
commands that exceed the configured authority envelope (max tilt,
max angular rate, max vertical acceleration; spec §13). Numeric
thresholds for steady-state error, overshoot, and settle time are
recorded at the HLR layer (HLR-CTL-201..204).

This requirement is the behavioral statement of stabilization; the
structural counterparts (HLR-CTL-002: algorithm/state split, the
substitutable `VehicleController` trait) are SYS-PIPE-001 / HLR-CTL-002
already in scope.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "aa8459c8-585e-402c-9de0-7daba25a575b"
id = "SYS-MIX-001"
title = "Mixer maps axis commands to bounded, geometrically valid actuator commands"
owner = "aviate-core@aviate"
description = """
For every axis command whose components lie inside the configured
authority envelope, the kernel's mixer SHALL produce actuator
commands whose components lie inside `[0.0, 1.0]` (`Normalized`)
and whose geometric relationship preserves the airframe's mixing
matrix. Specifically: for the zero axis command at hover throttle T,
all motors of a symmetric airframe (e.g. QuadX) SHALL receive T.

This is the behavioral statement of "the mixer is correct"; SYS-MOD-001
and the structural mixer LLRs (LLR-PIPE-104, LLR-STATE-106) cover
type/state plumbing but not numerical correctness.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "86aeb60c-68a1-45a3-b452-aef33a0f4df0"
id = "SYS-FLT-001"
title = "Faults produce defined, latched, safe responses"
owner = "aviate-core@aviate"
description = """
The kernel SHALL detect the fault conditions listed in spec §15
(numeric instability of the estimator, all-IMU-failed, command
staleness beyond `command_timeout_ms`, watchdog deadline missed)
and respond per the configured `FaultHandlingTable`:

  - Faults of category `Algorithm` (e.g. `NUMERIC_ERROR`,
    `ESTIMATOR_DIVERGED`) SHALL latch on first occurrence and clear
    only via `ground_reset()`.
  - Latched faults inhibiting control SHALL cause the kernel to emit
    the configured safe actuator pattern instead of computed mixer
    output.
  - Detection SHALL occur within one control cycle of the fault
    condition becoming true.

This requirement is the behavioral spine of spec §15 fault handling;
existing SYS rows cover none of it.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "5dedb209-3aec-452a-ab28-4b959a596fff"
id = "SYS-MORPH-001"
title = "Mode and geometry transitions do not break the control loop"
owner = "aviate-core@aviate"
description = """
The kernel SHALL support runtime transitions of `ConfigMode` (e.g.
multirotor Hover ↔ Cruise, VTOL transition) and incremental updates
of `GeometryState` (continuous airframe-morph parameters) while in
flight. During a transition:

  - The actuator command emitted in cycle N SHALL reflect exactly
    one consistent (mode, geometry) pair, never a partial mix.
  - The delta between cycle N and cycle N+1 actuator commands SHALL
    be bounded by the configured slew limit so the airframe does
    not see a discontinuous step.

The behavioral guarantee here is necessary for airframes whose
mission profile crosses mode boundaries (eVTOL transition, fixed-
wing-to-hover capture). The structural prerequisites (SYS-STATE-001
single-owner, SYS-CFG-001 immutable resolved config) are already in
scope.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "78a41dd0-c754-439f-a2a1-325111713954"
id = "SYS-INIT-001"
title = "Kernel cold-start and arm sequence is deterministic"
owner = "aviate-core@aviate"
description = """
Given identical input sensor traces and identical resolved
configuration, the kernel SHALL produce a bit-identical `KernelState`
at every cycle N ≥ 0 across runs and across redundant channels of
the same build. The arm sequence SHALL satisfy a published list of
pre-arm gates (estimator initialized + numerically clean, config
loaded + canonical-hash matches, watchdog kicked within deadline,
all sensor channels `Healthy` within the last second), and SHALL
reject `arm()` with a typed `ArmError` when any gate fails.

Determinism is a precondition for spec §16 lockstep (cross-channel
byte equality); the existing HLR-CFG-001 / HLR-STATE-* rows cover
the structural side of state ownership and config immutability, but
not the end-to-end "identical input ⇒ identical state at cycle N"
claim.
"""
verification_methods = ["test"]
traces_to = []

[[requirements]]
uid = "c925725e-29bf-40e1-b0d5-2e257ed02819"
id = "SYS-ARM-001"
title = "Disarmed kernel produces safe actuator output"
owner = "aviate-core@aviate"
description = """
While `init_state` is anything other than `Armed`, the kernel SHALL
emit only the configured safe (zero-or-idle) actuator pattern,
independent of estimator state, latched faults, commanded setpoint,
or watchdog health. This is the most fundamental ground-safety
invariant: a vehicle on the bench with rotors spinning because the
estimator briefly produced a non-zero setpoint is unacceptable
regardless of what else the kernel was doing.

The companion to SYS-FLT-001: faults force the same safe pattern
*after* arm; SYS-ARM-001 forces it *before* (and after disarm).
"""
verification_methods = ["test"]
traces_to = []
