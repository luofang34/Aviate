[[requirements]]
uid = "bb2e1695-a2e7-40c4-ae75-9711a8134b70"
id = "SYS-EST-001"
title = "State estimator is replaceable"
owner = "aviate-core@aviate"
description = """
The Aviate flight kernel SHALL accept an externally-supplied state
estimator implementation. Alternate algorithms (e.g. UKF, Invariant-EKF,
factor-graph backends) SHALL be substitutable without modifying kernel
control flow, the AviateKernelTrait surface (spec §20), or any
non-estimator subsystem (controller, mixer, sanitizer, envelope
protector). Substitution SHALL preserve the safety properties listed
in spec §21 (Architecture Invariants).
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "d6ca85b4-62d1-48d0-b16e-3415904cc604"
id = "SYS-STATE-001"
title = "Kernel runtime state has a single, observable owner"
owner = "aviate-core@aviate"
description = """
The flight kernel's runtime state — lifecycle (init/arm/disarm/fault),
current configuration mode, fault flag latch, control law authority,
gate-check state, cached actuator snapshot, and per-cycle timing
statistics — SHALL be held in exactly one structure (`KernelState`).
The kernel SHALL NOT shadow any of these fields elsewhere on
`AviateKernelImpl` or duplicate them into the pipeline or config
sub-structs.

This is the structural prerequisite for redundancy and replay (spec
§16, §17): Phase 5's `ChannelSnapshot` projection takes a borrow of
`KernelState` and produces the byte sequence redundant channels
exchange. With multiple owners, the projection would be ill-defined.

Phase 4 will additionally relocate EKF persistent state (quaternion,
position, velocity, biases, covariance) and sanitizer fallback state
(last-good vectors, age, consecutive-fallback counters) into
`KernelState`, at which point "every safety-relevant persistent
state field has exactly one owner" holds for the entire kernel —
not just the lifecycle slice this requirement covers.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "ed45538e-11f2-4887-95c2-91625b4a59cb"
id = "SYS-CFG-001"
title = "Flight-period kernel configuration is immutable"
owner = "aviate-core@aviate"
description = """
The set of kernel parameters that govern flight envelope, fault
handling, command-staleness threshold, per-mode actuator group
configuration, and last-ditch safe output (spec §13, §15.2, §12, §4,
§9, §10.5) SHALL be validated and resolved exactly once during kernel
construction and SHALL NOT be mutated during the flight loop. Lockstep
or backup channels comparing equality of these parameters at startup
SHALL deterministically detect firmware/tuning drift between channels.

This requirement is the structural precondition for spec §16
(redundancy) — without a single immutable configuration source per
channel, byte-for-byte equality across redundant channels is not
expressible.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "4207eadd-89b0-4a64-8310-49c336ee057c"
id = "SYS-MOD-001"
title = "Kernel HAL surface excludes link-layer concerns"
owner = "aviate-core@aviate"
description = """
Per spec §2.2 the flight kernel's external surface is sensor input,
actuator output, and system services (time, watchdog, reboot,
bootloader). Command framing, command transport, and telemetry
framing are link-layer concerns and SHALL NOT appear in the
`aviate-core` crate. Crates that drive radio links, serial framing,
or GCS protocols depend on `aviate-hal-io` (or higher-level link
crates) for these surfaces; `aviate-core` itself depends only on
sensor/actuator/system traits.

This invariant bounds the kernel's certification blast radius: the
kernel's compile-time dependency closure cannot be expanded by
dropping a link-protocol abstraction into `aviate-core` and is the
structural prerequisite for keeping the DAL-A boundary aligned with
spec §2.2.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "d45a87b2-6e51-42b0-995f-a7b6a6a011b9"
id = "SYS-PIPE-001"
title = "Pipeline algorithm-bundle identity is queryable"
owner = "aviate-core@aviate"
description = """
The flight kernel SHALL expose a deterministic 64-bit identity
witness for its substitutable algorithm bundle (estimator, vehicle
controller, mixer, sanitizer). Two independently-built channels
running byte-identical firmware SHALL compute the same witness;
distinct algorithm bundles SHALL compute distinct witnesses with
high probability.

This requirement is the structural precondition for spec §16
cross-channel firmware verification: peer channels exchange the
witness at lockstep entry and refuse lockstep on mismatch (firmware
drift detection). The witness covers algorithm *identity* — pairing
it with HLR-CFG-001 (configuration byte-equality) closes the
"different binary, same hash" attack surface.
"""
verification_methods = ["review", "test"]
traces_to = []

[[requirements]]
uid = "8f3a2c87-9d4e-4a1f-b7e2-3c6a8f1d9e02"
id = "SYS-RTM-001"
title = "Flight runtime is inside the certification boundary"
owner = "aviate-runtime@aviate"
description = """
The Aviate flight runtime (`aviate-runtime`) SHALL be in scope of
the DO-178C boundary when built with its `env-flight` feature. The
crate SHALL NOT, under that feature, depend on any sandbox
transport, simulator harness, or development tool that is itself
out of scope.

Sandbox transports (SITL/HITL via `aviate-hal-xil`) remain available
through the `env-sitl` / `env-hitl` features for development and
verification harnesses. Those features SHALL be mutually exclusive
with `env-flight` so a flight image cannot accidentally pull a
sandbox dependency in. The mutual exclusion is enforced at compile
time, not by configuration discipline; see HLR-RTM-001 for the
contract and LLR-RTM-101 for the mechanism.

Inclusion in the boundary closes the long-standing gap where the
"Aviate kernel is DO-178C-aimed" claim was honest only for
`aviate-core` and adjacent crates, while the actual control loop
(scheduling, runner state machine, board wiring) sat in sandbox.
"""
verification_methods = ["review"]
traces_to = []
