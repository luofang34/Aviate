version = "0.0.1"

[meta]
document_id = "AVIATE-DRQ-001"
revision = "1"

# Derived requirements arising from estimator-trait extraction.
# Each one would otherwise be implicit in implementation choice;
# recording them here documents the design decisions for review.

[[requirements]]
uid = "33bcf660-ebb5-45e3-9548-5e30fb38a8d3"
id = "DRQ-EST-001"
title = "Estimator::reset() preserves construction-time tuning"
owner = "aviate-core@aviate"
description = """
The kernel's ground_reset path needs to wipe filter state without
re-constructing the kernel. We therefore put reset() on the
Estimator trait rather than constraining `E: Default`. The reset
implementation for Ekf preserves EkfConfig (process/measurement
noise tunings, innovation gate, mag fusion thresholds) ŌĆö these
are deployment parameters, not state, and re-deriving them at
ground_reset time would be a regression.
"""
rationale = """
Without this DRQ, a future implementer reading reset()'s body
might mistake `*self = Self::new(self.config)` for a bug and
'simplify' it to `*self = Self::default()`, silently throwing
away tuning. The HLR-EST-003 determinism property requires that
behaviour after reset+init is identical to behaviour after fresh
construction+init only when configurations match.
"""
safety_impact = "low"

[[requirements]]
uid = "0d086076-b799-4715-981f-4bb42e0d9b1e"
id = "DRQ-CFG-001"
title = "load_config() returns InvalidFormat until the parser pipeline lands"
owner = "aviate-core@aviate"
description = """
The Phase 1 ResolvedKernelConfig consolidation introduces
"validated, flight-period-immutable configuration" as a structural
property but does NOT yet implement the validation parser. The
real validation ŌĆö checksum verification, range checks per spec ┬¦13
limits, mode_config integrity, fault_table consistency ŌĆö is
deferred to a post-Phase-5 PR.

`AviateKernelTrait::load_config()` SHALL return:
  - `Err(ConfigError::UnsupportedVersion)` for `config_block.version > 1`.
  - `Err(ConfigError::InvalidFormat)` for `version <= 1`, signaling
    "the parser for this version is not yet implemented."

Pre-Phase-4-followup, the v1 path silently returned `Ok(())`,
which misled callers into believing config-loading worked when
`self.cfg` remained at its `AviateKernelBuilder` defaults. The
honest typed-error return is the only acceptable interim
behavior ŌĆö a non-functional positive ack is worse than no API.

When the parser pipeline lands, the v1 InvalidFormat path becomes
`Ok(())` only after: (a) checksum verification passes, (b) parsed
fields validate against spec ┬¦13 / ┬¦15.2 / ┬¦19, and (c) the
parsed `ResolvedKernelConfig` is committed to `self.cfg` only
when the kernel is in `InitState::ConfigLoading` or `Disarmed`
(per HLR-CFG-002).
"""
rationale = """
Calling out the gap explicitly so a downstream auditor knows the
config-immutability claim (HLR-CFG-002) is structurally true today
but the *content* of the immutable config is still entirely
default-derived. The honest typed-error return surfaces the gap
to callers at the right place (the trait method) instead of
hiding it behind a misleading Ok. The risk goes up when a real
serial/binary loader lands ŌĆö the parser must be paired with the
checksum + range checks at the same time, otherwise callers will
treat any Ok as fully validated.
"""
safety_impact = "medium"

[[requirements]]
uid = "8dce106d-66a1-4746-838d-f14ffa5519c7"
id = "DRQ-MIX-001"
title = "safe_output is currently a global fallback; per-mode safe_pattern is preferred"
owner = "aviate-core@aviate"
description = """
`ResolvedKernelConfig.safe_output` is a single
`[Normalized; MAX_ACTUATORS]` array used as a last-ditch fallback
when the kernel forces safe output (Backup law, ENUM_INVALID, etc.).
Spec ┬¦10.5 + ┬¦9.2 are clearer: each `ActuatorGroupConfig` SHOULD
own its own `safe_pattern`, because a Hover safe output is not a
Cruise safe output (different actuator coupling). The per-group
`safe_pattern` ALREADY exists on `ActuatorGroupConfig` and IS used
by the sanitizer's per-group fallback path. The single global
`safe_output` is the secondary fallback when no per-group pattern
exists.
"""
rationale = """
Phase 1 keeps the global `safe_output` to avoid forcing every
airframe crate (multirotor, fixed-wing, future morphing) to refactor
their `ModeConfig` constructors in the same PR that introduces
`ResolvedKernelConfig`. A follow-up PR (post-Phase-5) will
deprecate the global `safe_output` once every airframe declares
per-mode `safe_pattern` arrays for every group it instantiates.
"""
safety_impact = "low"

[[requirements]]
uid = "ded4be21-1286-4351-a1fa-508720317660"
id = "DRQ-CTL-001"
title = "Tunable controller gains belong in ResolvedKernelConfig, not on the controller struct"
owner = "aviate-core@aviate"
description = """
Today's example controllers (`MultirotorController`,
`FixedWingController`, `VtolController`) hold their P-only gain
arrays as fields on `Self` (e.g.
`MultirotorController.pos_ctrl.gains`, `.rate_ctrl.gains`). Per
LLR-CTL-101's algorithm/state split, only firmware-constant
algorithm identity belongs on `Self` ŌĆö operator-tunable
parameters belong in `ResolvedKernelConfig`, where HLR-CFG-001
guarantees byte-equal cross-channel comparison and the
`algorithm_identity_hash` companion (HLR-PIPE-002) deliberately
does NOT cover them.

Concretely: two channels running the same compiled firmware but
different operator-applied PID gain tuning would currently produce
the same `algorithm_identity_hash` and pass lockstep entry while
diverging in flight. Closing this requires moving the P-gain
arrays out of the controller structs into a new
`ResolvedKernelConfig.controller_gains: ControllerGains` field,
indexed in some way the controller can read deterministically.
"""
rationale = """
Deferred for now because (a) today's gains are hardcoded
constants in `Default::default()` rather than runtime-tunable
input ŌĆö the `algorithm_identity_hash` collision risk is
hypothetical until the airframe crates start configuring gains
externally; (b) the move requires designing a `ControllerGains`
shape that's both extensible (multirotor needs 4 gain arrays;
fixed-wing energy loop will need different tunables) and
no_std-friendly. A follow-up PR introduces
`ResolvedKernelConfig.controller_gains` and re-points each
controller's `step` to read gains from cfg rather than `&self`.
"""
safety_impact = "medium"

[[requirements]]
uid = "c6c38eb8-20ec-45b3-93b3-a24a89be8bf6"
id = "DRQ-CTL-002"
title = "Controller gain tuning to meet cert-grade hover and position bounds"
owner = "aviate-core@aviate"
description = """
HLR-CTL-203 (hover hold) targets Ōēż 0.3 m altitude and Ōēż 0.5 m
horizontal in still air over a 30 s window. HLR-EST-203 targets
Ōēż 0.5 m horizontal / Ōēż 0.3 m vertical position estimate error.
The current SITL runs (`tests/missions/{hover_stability,position_hold,
attitude_control}.toml`) use **integration-smoke thresholds** ŌĆö the
vehicle takes off (~0.5 m to 6 m, run-dependent), motors fire, EKF
converges against gz-sim sensor noise, MAVLink command path works
end-to-end. The cert-grade bounds are not met by the current
gain set.

Root cause: `MultirotorController`'s P-only gains are hardcoded
constants tuned for the historical airframe model, not the X500
mass/inertia/motor parameters in PX4-gazebo-models. The attitude
loop occasionally saturates two motors out of four in run-to-run
conditions (typical on first run after a cold-start of the sim),
and the position loop drifts because there is no integral-action
term. Sensor-synthesis frame-convention errors (gz FLU body vs
aviate-core FRD body) compounded the issue earlier ŌĆö the
sitl-gazebo-x500 binary now applies the FLUŌåÆFRD conversion
correctly (see its unit tests), but the residual controller
oscillation is the still-open gap.

Closing this DRQ requires:
  1. Reading the actual hover-thrust trim point for the X500
     (motorConstant=8.55e-6 ├Ś 1000┬▓ ├Ś 4 = 34 N max vs 20.25 N
     weight ŌåÆ hover Ōēł 0.77 normalized, not 0.65).
  2. Tightening attitude-loop gains so the motor command stays
     symmetric at level setpoint (no [0, 1, 1, 0] saturation
     pattern under perfect sensors).
  3. Adding integral action to the position loop or moving to a
     LQR/cascade controller per HLR-CFG-002's cfg-resident gain
     model (which itself is blocked by DRQ-CTL-001).

Until closed, the SITL missions verify integration health, not
flight quality. The synthetic-tier unit tests (TST-EST-201,
TST-EST-206, TST-CTL-201, TST-CTL-202) pin the corresponding LLRs
against deterministic kinematic surrogates.
"""
rationale = """
Surfacing the gap explicitly so a downstream auditor reading the
test plan and seeing "Result: PASS" does not conclude the kernel
meets cert-grade flight quality ŌĆö only smoke-level integration
health is asserted by the X-tier. The U-tier unit tests are the
load-bearing evidence for the LLR-level claims; SITL is the
integrated witness, deliberately loose because cert-grade
tightening is the next ratchet, not the structural contract.
"""
safety_impact = "medium"

[[requirements]]
uid = "a6c98ab3-41d3-4947-8361-250ace2adb69"
id = "DRQ-FLT-001"
title = "Command-loss safe-mode slew limit"
owner = "aviate-core@aviate"
description = """
HLR-FLT-204 / LLR-FLT-208 require that when the kernel switches
to the command-loss-safe mode (due to `command_age_ms >=
command_timeout_ms`), the actuator command delta between the cycle
before the switch and the cycle of the switch respects a
configured per-actuator slew limit. The kernel currently switches
the output set point in one cycle without a slew-limited
transition; the abrupt change is bounded by the safe pattern's
own values but not by a rate-of-change limiter.

Closing this requires:
  1. A new `ResolvedKernelConfig.slew_limit_per_cycle:
     [Normalized; MAX_ACTUATORS]` field.
  2. A slew-limited writer at the end of `update_step` that clamps
     the per-actuator output to within `slew_limit` of the previous
     cycle's commanded output, with sign-aware behavior on direction
     reversal.
  3. The same machinery is needed for HLR-MORPH-202 / LLR-MORPH-202
     (geometry-state delta) ŌĆö see DRQ-MORPH-001.
"""
rationale = """
The contract is real and matters for airframe protection
(suddenly clamping a saturated motor to zero can shed lift faster
than the body can rotate to compensate). Deferring because the
field is missing from `ResolvedKernelConfig` and adding it
touches every airframe's `ModeConfig` construction. The current
abrupt switch is "safe in expectation" ŌĆö the safe pattern is
itself a low-thrust idle ŌĆö but doesn't formally satisfy the
slew-limit clause.
"""
safety_impact = "low"

[[requirements]]
uid = "addb460b-bd61-4944-a073-d9d253b20f2c"
id = "DRQ-MORPH-001"
title = "GeometryState mid-flight slew limit"
owner = "aviate-core@aviate"
description = """
HLR-MORPH-202 / LLR-MORPH-202 require that when `GeometryState`
(continuous airframe-morph parameter ŌĆö tilt-rotor angle,
fold-arm position) updates by some `dGeom`, the resulting
per-actuator command delta SHALL respect the configured slew
limit. The kernel currently reads `GeometryState` as a parameter
into the mixer with no inter-cycle smoothing ŌĆö a step change in
`GeometryState` produces an immediate step in mixer output.

Same closing path as DRQ-FLT-001: a `ResolvedKernelConfig.
slew_limit_per_cycle` field and a slew-limited writer at the
mixer's per-cycle output. Once DRQ-FLT-001 lands, this is a
parameter-not-event question and can close immediately.
"""
rationale = """
Current airframes (`aviate-airframe-multirotor`,
`aviate-airframe-fixed-wing`) hold a fixed `GeometryState` for the
duration of flight, so the contract is vacuously satisfied. The
contract becomes binding for tilt-rotor / fold-arm /
transformable airframes ŌĆö at which point the slew limiter must
already be in place. Capturing the DRQ here keeps the HLR honest:
the property is a non-event under existing airframes, not a
verified event.
"""
safety_impact = "low"
