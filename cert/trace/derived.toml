[meta]
document_id = "AVIATE-DRQ-001"
revision = "1"

# Derived requirements: design decisions and disclosed gaps that
# would otherwise be implicit in implementation choice; recording
# them here documents them for review.
#
# `status` is the machine-readable lifecycle marker; the test plan's
# DRQ table must state the same value
# (scripts/check_test_plan_sync.py enforces equality):
#   open     — the gap is real and unclosed
#   closed   — the contract is realized in code with a named witness
#   standing — a recorded design decision, not a gap; nothing to close

[[requirements]]
uid = "33bcf660-ebb5-45e3-9548-5e30fb38a8d3"
id = "DRQ-EST-001"
status = "standing"
title = "Estimator::reset() preserves construction-time tuning"
owner = "aviate-core@aviate"
description = """
The kernel's ground_reset path needs to wipe filter state without
re-constructing the kernel. We therefore put reset() on the
Estimator trait rather than constraining `E: Default`. The reset
implementation for Ekf preserves EkfConfig (process/measurement
noise tunings, innovation gate, mag fusion thresholds) — these
are deployment parameters, not state, and re-deriving them at
ground_reset time would be a regression.
"""
rationale = """
Without this DRQ, a future implementer reading reset()'s body
might mistake `*self = Self::new(self.config)` for a bug and
'simplify' it to `*self = Self::default()`, silently throwing
away tuning. The HLR-EST-003 determinism property requires that
behaviour after reset+init is identical to behaviour after fresh
construction+init only when configurations match.
"""
safety_impact = "low"

[[requirements]]
uid = "0d086076-b799-4715-981f-4bb42e0d9b1e"
id = "DRQ-CFG-001"
status = "open"
title = "load_config() returns InvalidFormat until the parser pipeline lands"
owner = "aviate-core@aviate"
description = """
The Phase 1 ResolvedKernelConfig consolidation introduces
"validated, flight-period-immutable configuration" as a structural
property but does NOT yet implement the validation parser. The
real validation — checksum verification, range checks per spec §13
limits, mode_config integrity, fault_table consistency — is
deferred to a post-Phase-5 PR.

`AviateKernelTrait::load_config()` SHALL return:
  - `Err(ConfigError::UnsupportedVersion)` for `config_block.version > 1`.
  - `Err(ConfigError::InvalidFormat)` for `version <= 1`, signaling
    "the parser for this version is not yet implemented."

Pre-Phase-4-followup, the v1 path silently returned `Ok(())`,
which misled callers into believing config-loading worked when
`self.cfg` remained at its `AviateKernelBuilder` defaults. The
honest typed-error return is the only acceptable interim
behavior — a non-functional positive ack is worse than no API.

When the parser pipeline lands, the v1 InvalidFormat path becomes
`Ok(())` only after: (a) checksum verification passes, (b) parsed
fields validate against spec §13 / §15.2 / §19, and (c) the
parsed `ResolvedKernelConfig` is committed to `self.cfg` only
when the kernel is in `InitState::ConfigLoading` or `Disarmed`
(per HLR-CFG-002).
"""
rationale = """
Calling out the gap explicitly so a downstream auditor knows the
config-immutability claim (HLR-CFG-002) is structurally true today
but the *content* of the immutable config is still entirely
default-derived. The honest typed-error return surfaces the gap
to callers at the right place (the trait method) instead of
hiding it behind a misleading Ok. The risk goes up when a real
serial/binary loader lands — the parser must be paired with the
checksum + range checks at the same time, otherwise callers will
treat any Ok as fully validated.
"""
safety_impact = "medium"

[[requirements]]
uid = "8dce106d-66a1-4746-838d-f14ffa5519c7"
id = "DRQ-MIX-001"
status = "open"
title = "safe_output is currently a global fallback; per-mode safe_pattern is preferred"
owner = "aviate-core@aviate"
description = """
`ResolvedKernelConfig.safe_output` is a single
`[Normalized; MAX_ACTUATORS]` array used as a last-ditch fallback
when the kernel forces safe output (Backup law, ENUM_INVALID, etc.).
Spec §10.5 + §9.2 are clearer: each `ActuatorGroupConfig` SHOULD
own its own `safe_pattern`, because a Hover safe output is not a
Cruise safe output (different actuator coupling). The per-group
`safe_pattern` ALREADY exists on `ActuatorGroupConfig` and IS used
by the sanitizer's per-group fallback path. The single global
`safe_output` is the secondary fallback when no per-group pattern
exists.
"""
rationale = """
Phase 1 keeps the global `safe_output` to avoid forcing every
airframe crate (multirotor, fixed-wing, future morphing) to refactor
their `ModeConfig` constructors in the same PR that introduces
`ResolvedKernelConfig`. A follow-up PR (post-Phase-5) will
deprecate the global `safe_output` once every airframe declares
per-mode `safe_pattern` arrays for every group it instantiates.
"""
safety_impact = "low"

[[requirements]]
uid = "ded4be21-1286-4351-a1fa-508720317660"
id = "DRQ-CTL-001"
status = "closed"
title = "Controller tuning lives in ResolvedKernelConfig; a builder-verified immutable copy is permitted on the controller"
owner = "aviate-core@aviate"
description = """
Operator-tunable controller parameters live in
`ResolvedKernelConfig` (`cascade_gains`, `hover_thrust_norm`), per
LLR-CTL-101's algorithm/state split: only firmware-constant
algorithm identity belongs on controller `Self`. `canonical_hash`
folds both tuning fields, so HLR-CFG-001's byte-equal cross-channel
comparison covers tuning — two channels with different applied
tunings cannot pass lockstep entry while diverging in flight, even
though `algorithm_identity_hash` (HLR-PIPE-002) deliberately
excludes tunables.

Contract for controller-held tuning: a controller MAY hold a
validated immutable copy of its tuning; it MUST NOT be an
independent tuning source. `AviateKernelBuilder::build` enforces
`VehicleController::verify_config_binding` — the controller's
canonical tuning identity (the FNV fold
`ResolvedKernelConfig::controller_tuning_identity` computes over
`cascade_gains` + `hover_thrust_norm`; both sides call the same
function, so the encodings cannot drift) must equal the resolved
configuration's, or construction fails with a typed
`ControllerConfigMismatch` carrying both identities. A controller
and a config supplied independently therefore cannot disagree in a
built kernel. The alternative contract — forbidding controller-held
tuning entirely — is rejected: the copy lets `step()` read gains
without indirection on the hot path, and the binding invariant
makes silent divergence a construction failure rather than a
flight-time hazard.

Witnessed by the per-field mutation sweep in
`aviate-core/tests/config_binding_tests.rs`, which pins every gains
and hover field to the rejection path.
"""
rationale = """
Without a recorded contract, a reviewer finding gain fields on a
controller struct could read them as a violation of the
algorithm/state split, or a future implementer could add a second
tuning source that bypasses the binding check. The contract is:
the resolved configuration is the single tuning authority; any
controller-resident copy is legal only because the builder proves
it identical before a kernel exists.
"""
safety_impact = "medium"

[[requirements]]
uid = "c6c38eb8-20ec-45b3-93b3-a24a89be8bf6"
id = "DRQ-CTL-002"
status = "open"
title = "Controller gain tuning to meet cert-grade hover and position bounds"
owner = "aviate-core@aviate"
description = """
HLR-CTL-203 (hover hold) targets ≤ 0.3 m altitude and ≤ 0.5 m
horizontal in still air over a 30 s window. HLR-EST-203 targets
≤ 0.5 m horizontal / ≤ 0.3 m vertical position estimate error.
The current SITL runs (`tests/missions/{hover_stability,position_hold,
attitude_control}.toml`) use **integration-smoke thresholds** — the
vehicle takes off (~0.5 m to 6 m, run-dependent), motors fire, EKF
converges against gz-sim sensor noise, MAVLink command path works
end-to-end. The cert-grade bounds are not met by the current
gain set.

Root cause: `MultirotorController`'s P-only gains are hardcoded
constants tuned for the historical airframe model, not the X500
mass/inertia/motor parameters in PX4-gazebo-models. The attitude
loop occasionally saturates two motors out of four in run-to-run
conditions (typical on first run after a cold-start of the sim),
and the position loop drifts because there is no integral-action
term. Sensor-synthesis frame-convention errors (gz FLU body vs
aviate-core FRD body) compounded the issue earlier — the
sitl-gazebo-x500 binary now applies the FLU→FRD conversion
correctly (see its unit tests), but the residual controller
oscillation is the still-open gap.

Closing this DRQ requires:
  1. Reading the actual hover-thrust trim point for the X500
     (motorConstant=8.55e-6 × 1000² × 4 = 34 N max vs 20.25 N
     weight → hover ≈ 0.77 normalized, not 0.65).
  2. Tightening attitude-loop gains so the motor command stays
     symmetric at level setpoint (no [0, 1, 1, 0] saturation
     pattern under perfect sensors).
  3. Adding integral action to the position loop or moving to a
     LQR/cascade controller per HLR-CFG-002's cfg-resident gain
     model (which itself is blocked by DRQ-CTL-001).

Until closed, the SITL missions verify integration health, not
flight quality. The synthetic-tier unit tests (TST-EST-201,
TST-EST-206, TST-CTL-201, TST-CTL-202) pin the corresponding LLRs
against deterministic kinematic surrogates.
"""
rationale = """
Surfacing the gap explicitly so a downstream auditor reading the
test plan and seeing "Result: PASS" does not conclude the kernel
meets cert-grade flight quality — only smoke-level integration
health is asserted by the X-tier. The U-tier unit tests are the
load-bearing evidence for the LLR-level claims; SITL is the
integrated witness, deliberately loose because cert-grade
tightening is the next ratchet, not the structural contract.
"""
safety_impact = "medium"

[[requirements]]
uid = "8e9c67e1-91bd-4183-94fd-304e49b40689"
id = "DRQ-CTL-003"
status = "open"
title = "Closed-loop position control end-to-end"
owner = "aviate-core@aviate"
description = """
The kernel accepts `SET_POSITION_TARGET_LOCAL_NED` and routes it
through `MultirotorController::step` (pos_ctrl → vel_ctrl →
att_ctrl → rate_ctrl). The mission DSL carries the criteria
needed to verify closed-loop flight (`Waypoint`, `StableHover`).
**End-to-end the loop does not yet hold position.** Two failure
modes:

  1. **EKF position divergence.** Under closed-loop control the
     attitude controller commands non-trivial roll/pitch rates;
     the IMU integration in `Ekf::predict_state` accumulates
     position error faster than the GNSS update can correct,
     even with the now-correctly-plumbed `position_ned` field on
     `RawGnssReading`. Within a few seconds the EKF reports the
     vehicle 50–100 m away from ground truth, the position loop
     responds to the (false) error, and the vehicle either flies
     in the wrong direction or saturates the mixer.

  2. **Mixer thrust loss under saturated yaw.** With a non-zero
     EKF yaw error and a near-saturated collective thrust, the
     mixer adds yaw-axis corrections that drive two of four
     motor commands to zero, dropping the realized lift to ~50 %
     of commanded. The closed-loop altitude path then commands
     even more thrust to compensate, which only deepens the
     saturation.

Closing this DRQ requires (at least): tighter EKF tuning under
high-disturbance IMU input, an integral term on the position
loop to drive out steady-state error, and a thrust-priority
mixer that scales yaw correction when it would push any motor
below zero. None of these is gated by a missing API or trace
row — they are control-engineering work on top of the existing
structural surface.

Witnessed (negative) by `tests/missions/square_course.toml`,
which executes the full position-target path but does not
reliably pass its `ReachedWaypoint` criteria today. Open-loop
flight is witnessed by `tests/missions/hover_trim_check.toml`
(climb → hover at trim → descend → land) which passes 5/5.
"""
rationale = """
Honest scope: this PR delivers the harness, the criteria, and
the controller calibration to **support** closed-loop missions
(hover_thrust trim, linear motor mapping, min-thrust gate, EKF
TRIAD seed, GNSS local-NED plumbing). The remaining work — make
the closed loop actually hold position to within a 1 m bound —
is a separate engineering iteration with its own verification
budget, not a one-line tuning fix.
"""
safety_impact = "medium"

[[requirements]]
uid = "a6c98ab3-41d3-4947-8361-250ace2adb69"
id = "DRQ-FLT-001"
status = "closed"
title = "Command-loss safe-mode slew limit"
owner = "aviate-core@aviate"
description = """
HLR-FLT-204 / LLR-FLT-208 require that when the kernel switches
to the command-loss-safe mode (due to `command_age_ms >=
command_timeout_ms`), the actuator command delta between the cycle
before the switch and the cycle of the switch respects a
configured per-actuator slew limit.

The kernel satisfies this with a per-cycle slew writer:
`ResolvedKernelConfig.slew_limit_per_cycle:
[Normalized; MAX_ACTUATORS]` plus
`aviate-core/src/kernel/slew.rs::apply_slew_limit`, invoked in
`kernel_update.rs` after sanitization and before result
construction, so controller-commanded bumps and sanitizer-induced
substitutions both respect the per-cycle delta limit. A per-channel
limit of zero disables the limiter for that channel, so airframes
that do not opt in see no behavior change. Severe-fault
early-return paths bypass the limiter so LLR-FLT-205
(NUMERIC_ERROR → immediate safe pattern) is preserved. Witnessed by
TST-FLT-208 (`aviate-core/tests/slew_limit_tests.rs`).
"""
rationale = """
The contract matters for airframe protection: clamping a saturated
motor to zero in one cycle can shed lift faster than the body can
rotate to compensate. An abrupt un-slewed switch would be "safe in
expectation" — the safe pattern is itself a low-thrust idle — but
would not satisfy the slew-limit clause. Per-airframe
slew_limit_per_cycle values remain a tuning concern for the
airframe-specific configs; the cert-binding contract is the writer
itself, not the chosen values.
"""
safety_impact = "low"

[[requirements]]
uid = "addb460b-bd61-4944-a073-d9d253b20f2c"
id = "DRQ-MORPH-001"
status = "closed"
title = "GeometryState mid-flight slew limit"
owner = "aviate-core@aviate"
description = """
HLR-MORPH-202 / LLR-MORPH-202 require that when `GeometryState`
(continuous airframe-morph parameter — tilt-rotor angle,
fold-arm position) updates by some `dGeom`, the resulting
per-actuator command delta SHALL respect the configured slew
limit.

The same per-cycle slew writer that satisfies DRQ-FLT-001 closes
this: `aviate-core/src/kernel/slew.rs::apply_slew_limit` bounds the
final per-actuator delta each cycle regardless of what moved it, so
a geometry step propagating through the mixer is clamped exactly as
a control-law switch is. Witnessed by TST-FLT-208, which traces to
LLR-MORPH-202 as well as LLR-FLT-208.
"""
rationale = """
Current airframes (`aviate-airframe-multirotor`,
`aviate-airframe-fixed-wing`) hold a fixed `GeometryState` for the
duration of flight and ship the zero (disabled) default limit, so
the mechanism is exercised by test rather than by flight. The
contract becomes operative for tilt-rotor / fold-arm /
transformable airframes, which must ship non-zero
slew_limit_per_cycle values — the limiter is in place, so that is
an airframe configuration decision, not a kernel change.
"""
safety_impact = "low"

[[requirements]]
uid = "c093b1a7-a7e0-4e18-91fb-fb73ec8c5f20"
id = "DRQ-CTL-004"
status = "closed"
title = "Behavior-shaping control limits are classified: hashed tuning or registered invariants"
owner = "aviate-core@aviate"
description = """
Every behavior-shaping numeric limit in the control law SHALL be one
of exactly two things: (a) airframe tuning — a validated
`CascadeGains` field covered by `ResolvedKernelConfig::canonical_hash`
and `controller_tuning_identity` and probed field-by-field by both
mutation sweeps (the canonical-hash sweep in
aviate-core/src/kernel/config/canonical/tests.rs and the builder
binding sweep in aviate-core/tests/config_binding_tests.rs); or (b)
an algorithm invariant — a named constant in
`aviate-core/src/control/law_invariants.rs` with a WHY rationale,
compile-time bounds, and a behavior boundary test, adjudicated by the
algorithm-identity gate through the controller-owned tree.

Classified under this contract: `att_max_rate_cmd` (3.0 rad/s
attitude-rate command cap) and `vel_max_yaw_step` (0.6 rad per-cycle
yaw-error step) are tuning; `DISARMED_COLLECTIVE_THRESHOLD` (0.02
normalized collective ground-gate epsilon),
`MAX_HORIZONTAL_ACCEL_CMD_MPS2` (1 g tilt-model validity clamp),
`TILT_COMP_COS_FLOOR` (0.5 cosine floor, 2x amplification cap) and
`STANDARD_GRAVITY_MPS2` (9.81) are invariants.

The classification is executable: `scripts/check_control_limits.sh`
(CI job `control-limits`) checks every float literal in the
production control tree against `cert/control_limits_registry.toml`
and fails on an unregistered constant (even one with a structural
value), on a registry/struct mismatch, on a tuning field missing its
hash feed or either mutation probe, and on an invariant whose source
value drifts from its registered pin. Behavior witnesses:
`horizontal_accel_command_is_clamped_at_the_tilt_model_bound` and
`tilt_compensation_is_floored_past_the_cos_floor` (velocity_tests.rs),
`disarm_gate_boundary_is_the_named_invariant`
(tests/multirotor_controller_tests.rs), and the gate's own
`--self-test` fixtures.
"""
rationale = """
A bare constant in a controller implementation body is invisible to
lockstep: two channels can disagree on it only by running different
firmware, but nothing forces the next such constant to be reviewed as
either tuning (which must be hash-covered so config divergence blocks
lockstep entry) or an invariant (which must carry rationale, bounds,
and identity adjudication). Leaving the distinction implicit makes
the canonical configuration incomplete and invites unreviewed
behavior changes hidden inside "refactors". The registry makes the
next constant fail CI until its author decides — and documents —
which of the two assurance paths it takes.
"""
safety_impact = "medium"
