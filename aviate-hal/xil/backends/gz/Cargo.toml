[package]
name = "aviate-backend-gz"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "Aviate Gazebo backend - implements KinematicsBackend for gz-sim"

[lib]
# Build as both rlib (for Rust deps) and cdylib (for C++ FFI)
crate-type = ["rlib", "cdylib"]

[features]
default = []
# Link against libaviate_gz_bridge_static.a for shared memory FFI
gz-plugin = []

[dependencies]
aviate-hal-xil = { path = "../.." }
aviate-link = { path = "../../../../aviate-link" }
once_cell = "1.19"
log = "0.4"

[build-dependencies]
# Compiles the standalone POSIX shared-memory bridge (plugin/
# aviate_gz_bridge.cc) from source so the FFI link is self-contained on
# any host — no prebuilt static lib or Gazebo toolchain required.
cc = "1"
