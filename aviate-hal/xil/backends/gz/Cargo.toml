[package]
publish = false  # internal crate — not released to crates.io
name = "aviate-backend-gz"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "Aviate Gazebo backend - implements KinematicsBackend for gz-sim"

[lib]
# rlib only. Nothing links this crate from C: the gz-sim plugin is
# self-contained C++ over the shared-memory contract, so the former
# cdylib + direct-FFI bypass (gazebo_bridge.rs) was dead. A cdylib
# also breaks `cargo test --all-targets`: its artifact carries no
# metadata hash, and the workspace's `panic = "abort"` bins plus
# always-unwind test units race for the one output path (cargo#6313).
crate-type = ["rlib"]

[features]
default = []
gz-plugin = []

[dependencies]
aviate-hal-xil = { path = "../.." }
aviate-link = { path = "../../../../aviate-link" }
aviate-xil-contract = { path = "../../contract" }
aviate-xil-shm = { path = "../../shm" }
log = "0.4"
