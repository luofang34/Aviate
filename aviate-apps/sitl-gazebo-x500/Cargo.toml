[package]
name = "aviate-app-sitl-gazebo-x500"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "X500 quadcopter on Gazebo SITL"

[[bin]]
name = "sitl-gazebo-x500"
path = "src/main.rs"

[lib]
name = "aviate_app_sitl_gazebo_x500"
path = "src/lib.rs"

[features]
gz-plugin = ["aviate-backend-gz/gz-plugin", "aviate-board-sitl-gazebo/gz-plugin"]
multi-vehicle = ["mavrouter"]
default = ["gz-plugin"]

[dependencies]
aviate-core = { path = "../../aviate-core" }
aviate-link = { path = "../../aviate-link" }
aviate-hal-xil = { path = "../../aviate-hal/xil" }
aviate-backend-gz = { path = "../../aviate-hal/xil/backends/gz", optional = true }
aviate-board-sitl-gazebo = { path = "../../aviate-boards/sitl-gazebo" }
aviate-airframe-multirotor = { path = "../../aviate-airframes/multirotor", features = ["x500"] }

# Multi-vehicle routing (optional)
mavrouter = { version = "0.1.4", optional = true }
