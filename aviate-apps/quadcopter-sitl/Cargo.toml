[package]
name = "aviate-app-quadcopter-sitl"
edition.workspace = true
version.workspace = true
license.workspace = true

[[bin]]
name = "aviate-app-quadcopter-sitl"
path = "src/main.rs"

[[bin]]
name = "gz-bridge"
path = "src/gz_bridge_main.rs"
required-features = ["gz-bridge"]

[[bin]]
name = "sitl-test"
path = "src/sitl_test.rs"

[features]
default = []
gz-bridge = ["aviate-platform-sitl/gz-bridge"]

[dependencies]
aviate-core = { path = "../../aviate-core" }
aviate-mavlink = { path = "../../aviate-mavlink" }
aviate-platform-sitl = { path = "../../aviate-platform/sitl" }
