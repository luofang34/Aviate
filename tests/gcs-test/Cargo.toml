[package]
publish = false  # internal crate — not released to crates.io
name = "gcs-test"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "GCS test tool for SITL mission testing"

[[bin]]
name = "gcs-test"
path = "src/main.rs"

[features]
default = []
# Enable Gazebo backend for ground truth and XIL mode (requires gz-plugin).
# Note: the former `aviate-app-sitl-gazebo-x500` app tree was removed in
# 0b63a22; consumers now drive gz via the plugin directly.
gazebo = [
    "dep:aviate-backend-gz",
    "aviate-backend-gz/gz-plugin",
]

[dependencies]
aviate-hal-xil = { path = "../../aviate-hal/xil" }
aviate-backend-gz = { path = "../../aviate-hal/xil/backends/gz", optional = true }
libc = "0.2"

clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
