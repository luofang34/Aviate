# Aviate SITL: Open-loop ballistic-style flight — strict per-step
# verification
#
# Without closed-loop altitude hold (the kernel's `MultirotorController`
# has the cascaded att/rate loop disabled today — see DRQ-CTL-003)
# the X500 cannot strictly hover: at any thrust value, residual
# velocity from earlier phases persists. What it CAN do is fly a
# ballistic profile cleanly — straight up, coast, decelerate,
# descend, land — with **zero horizontal drift**.
#
# Every criterion below is throughout-phase. xy drift ≤ 0.5 m for
# the entire flight. attitude bounded to ±10° throughout (the X500
# is passively stable under symmetric thrust). The mission passes
# only when the vehicle visibly performs a clean vertical flight.
#
# Closed-loop course-flight is the next deliverable; the criteria
# (`station_keeping`, `trajectory_tracking`, `returned_near`) and
# the position-target plumbing are already in place — they wait
# on the attitude controller landing.

[test]
name = "hover_trim_check"
description = "Real open-loop flight — ascend, decelerate, descend, land"
lockstep = true

[[vehicles]]
id = "x500"
model = "x500"
instance = 0
spawn_position = [0.0, 0.0, 0.0]
spawn_heading = 0.0

[vehicles.mission]
name = "hover_trim_check"

[[vehicles.mission.phases]]
name = "arm"
duration_ms = 500
action = { type = "arm" }
verify = [{ type = "armed", value = true }]

[[vehicles.mission.phases]]
name = "settle"
duration_ms = 1000
action = { type = "thrust", value = 0.0 }
verify = [
  { type = "armed", value = true },
  { type = "station_keeping", center = [0.0, 0.0, 0.0], xy_tolerance = 0.2, z_tolerance = 0.2 },
  { type = "attitude_bounded", roll_pitch_max_deg = 5.0 },
]

# Ascend at 0.85 thrust. Net upward thrust ~4.5 N gives a ~2.2
# m/s² acceleration; in 2.5 s the vehicle reaches ~7 m at ~5.5 m/s.
[[vehicles.mission.phases]]
name = "ascend"
duration_ms = 2500
action = { type = "thrust", value = 0.85 }
verify = [
  { type = "armed", value = true },
  { type = "min_altitude", value = 4.0 },
  { type = "max_excursion", center = [0.0, 0.0, -4.0], xy_max = 0.5, z_max = 10.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 15.0 },
]

# Decelerate at sub-hover thrust. Net downward force brings the
# climb rate down to zero (apex) and into descent.
[[vehicles.mission.phases]]
name = "decelerate"
duration_ms = 3000
action = { type = "thrust", value = 0.55 }
verify = [
  { type = "armed", value = true },
  { type = "max_excursion", center = [0.0, 0.0, -8.0], xy_max = 0.5, z_max = 12.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 15.0 },
]

# Descend: cut thrust further. The vehicle continues toward the
# ground.
[[vehicles.mission.phases]]
name = "descend"
duration_ms = 2000
action = { type = "thrust", value = 0.30 }
verify = [
  { type = "armed", value = true },
  { type = "max_excursion", center = [0.0, 0.0, -4.0], xy_max = 0.5, z_max = 12.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 15.0 },
]

# Land: thrust to zero. Vehicle is on the ground by phase end.
[[vehicles.mission.phases]]
name = "land"
duration_ms = 3000
action = { type = "thrust", value = 0.0 }
verify = [
  { type = "max_altitude", value = 1.0 },
  { type = "max_excursion", center = [0.0, 0.0, 0.0], xy_max = 0.5, z_max = 8.0 },
]

[[vehicles.mission.phases]]
name = "disarm"
duration_ms = 500
action = { type = "disarm" }
verify = [{ type = "armed", value = false }]
