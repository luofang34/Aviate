# Aviate SITL: Open-loop climb-and-land — attitude-bounded
#
# Demonstrates the FC ↔ gz-sim ↔ kernel integration loop in
# OPEN-LOOP attitude+thrust mode. Each flight phase carries:
#
#   * the existing reached-altitude / max-altitude end-state
#     gates that demonstrate motors actually push the airframe,
#   * an `attitude_bounded` throughout-phase gate that fails if
#     the body tumbles past ±30° (catches "climbed briefly then
#     flipped"),
#   * a `max_excursion` throughout-phase gate that fails if the
#     vehicle wanders horizontally far from the spawn point
#     (catches "shot off sideways and crashed").
#
# These bounds are loose vs the cert-grade hover thresholds
# tracked on DRQ-CTL-002 — open-loop attitude commands cannot
# hold position. The strict-hover mission `static_hover.toml`
# uses `station_keeping` + tighter attitude bounds and FAILS
# today because the closed-loop position controller is not yet
# ready (DRQ-CTL-003). Both missions are honest — neither
# passes a flight that did not actually happen.

[test]
name = "hover_trim_check"
description = "Open-loop climb / descend / land, attitude-bounded"
lockstep = true

[[vehicles]]
id = "x500"
model = "x500"
instance = 0
spawn_position = [0.0, 0.0, 0.0]
spawn_heading = 0.0

[vehicles.mission]
name = "hover_trim_check"

[[vehicles.mission.phases]]
name = "arm"
duration_ms = 500
action = { type = "arm" }
verify = [{ type = "armed", value = true }]

[[vehicles.mission.phases]]
name = "settle"
duration_ms = 2000
action = { type = "thrust", value = 0.0 }
verify = [
  { type = "armed", value = true },
  { type = "station_keeping", center = [0.0, 0.0, 0.0], xy_tolerance = 0.2, z_tolerance = 0.2 },
  { type = "attitude_bounded", roll_pitch_max_deg = 10.0 },
]

# Climb at 0.85 thrust. Reach ≥ 2 m, stay within a 3 m XY box
# around the spawn point (catches "shot off sideways"), and
# never tip past ±30° (catches "tumbled into the air").
[[vehicles.mission.phases]]
name = "climb"
duration_ms = 4000
action = { type = "thrust", value = 0.85 }
verify = [
  { type = "armed", value = true },
  { type = "min_altitude", value = 2.0 },
  { type = "max_excursion", center = [0.0, 0.0, -2.0], xy_max = 3.0, z_max = 5.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 30.0 },
]

# Hold at the calibrated hover trim. Open-loop trim cannot keep
# the vehicle stationary — it drifts. We assert only the
# attitude bound and the bounding-box excursion, not strict
# station-keeping. A tighter `station_keeping` criterion lives
# on the closed-loop sibling mission (`static_hover.toml`) and
# is the test that needs to pass before we claim real hover.
[[vehicles.mission.phases]]
name = "hover_at_trim"
duration_ms = 4000
action = { type = "thrust", value = 0.81 }
verify = [
  { type = "armed", value = true },
  { type = "max_excursion", center = [0.0, 0.0, -3.0], xy_max = 4.0, z_max = 5.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 30.0 },
]

[[vehicles.mission.phases]]
name = "descend"
duration_ms = 3000
action = { type = "thrust", value = 0.55 }
verify = [
  { type = "armed", value = true },
  { type = "max_excursion", center = [0.0, 0.0, -2.0], xy_max = 4.0, z_max = 5.0 },
  { type = "attitude_bounded", roll_pitch_max_deg = 30.0 },
]

[[vehicles.mission.phases]]
name = "land"
duration_ms = 3000
action = { type = "thrust", value = 0.0 }
verify = [
  { type = "max_altitude", value = 1.0 },
  { type = "max_excursion", center = [0.0, 0.0, 0.0], xy_max = 4.0, z_max = 5.0 },
]

[[vehicles.mission.phases]]
name = "disarm"
duration_ms = 500
action = { type = "disarm" }
verify = [{ type = "armed", value = false }]
