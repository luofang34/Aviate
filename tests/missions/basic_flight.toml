# Aviate SITL Test: Basic Flight
#
# Fundamental flight test for SITL verification.
# Tests basic motor control, takeoff, and landing.
#
# This is the simplest test - if this fails, nothing else will work.
# Used as a smoke test before running more complex tests.

[test]
name = "basic_flight"
description = "Basic single vehicle flight test (takeoff and land)"
lockstep = true

# Note: World file is generated dynamically based on vehicles and lockstep settings

[[vehicles]]
id = "x500"
model = "x500"
instance = 0
spawn_position = [0.0, 0.0, 0.0]
spawn_heading = 0.0

[vehicles.mission]
name = "basic_takeoff_land"

# Phase 1: Arm
# Verifies: Arm command accepted, motors ready
[[vehicles.mission.phases]]
name = "arm"
duration_ms = 500
action = { type = "arm" }
verify = [{ type = "armed", value = true }]

# Phase 2: Takeoff — motors fire and the vehicle leaves the ground.
# `basic_flight` exists to prove the full FC ↔ gz-sim loop closes and
# motors actually drive measurable lift, not to certify control
# accuracy. Strict altitude / position-hold bounds (cm-level) live in
# HLR-CTL-203 / `hover_stability.toml`. Threshold here is a 10 cm
# smoke test against zero motion.
[[vehicles.mission.phases]]
name = "takeoff"
duration_ms = 6000
action = { type = "thrust", value = 0.8 }
verify = [{ type = "min_altitude", value = 0.1 }]

# Phase 3: Brief hover — vehicle stays above the ground.
[[vehicles.mission.phases]]
name = "hover"
duration_ms = 2000
action = { type = "thrust", value = 0.65 }
verify = [{ type = "min_altitude", value = 0.1 }]

# Phase 4: Land
# Verifies: Vehicle descends when thrust reduced
[[vehicles.mission.phases]]
name = "land"
duration_ms = 4000
action = { type = "thrust", value = 0.0 }
verify = [{ type = "max_altitude", value = 15.0 }]

# Phase 5: Disarm
# Verifies: Motors stop, disarm command accepted
[[vehicles.mission.phases]]
name = "disarm"
duration_ms = 500
action = { type = "disarm" }
verify = [{ type = "armed", value = false }]
