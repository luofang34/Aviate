version: 2
updates:
  # Root workspace + bootloader workspace (separate Cargo.lock).
  - package-ecosystem: cargo
    directories:
      - "/"
      - "/aviate-bootloader"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # bmi2 breaks its API inside patch releases (0.1.1 -> 0.1.2 changed
      # Bmi2's generics and new_spi's signature); aviate-drivers exact-pins
      # it. Bump manually with a migration, never automatically.
      - dependency-name: bmi2
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns:
          - "*"

  # external/ driver + model submodules; review carefully — PX4-gazebo-models
  # bumps can change SITL behavior.
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(submodules)"
