name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Coverage threshold is 100% after documented exclusions.
  # See aviate-core/coverage.exclude for exclusion list with justifications.
  # This ensures new code cannot be introduced without tests.
  COVERAGE_THRESHOLD: 100

jobs:
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install ARM target
        run: rustup target add thumbv7em-none-eabihf

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check workspace (host)
        run: cargo check --workspace --exclude aviate-app-quadcopter-stm32h7

      - name: Check embedded target
        run: cargo check -p aviate-app-quadcopter-stm32h7 --target thumbv7em-none-eabihf

      - name: Clippy (host)
        run: cargo clippy --workspace --exclude aviate-app-quadcopter-stm32h7 -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --exclude aviate-app-quadcopter-stm32h7

  coverage:
    name: Coverage (DO-178C LLVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust nightly + llvm-tools
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add llvm-tools-preview --toolchain nightly

      - name: Cache grcov binary
        id: cache-grcov
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/grcov
          key: ${{ runner.os }}-grcov-0.10

      - name: Install grcov
        if: steps.cache-grcov.outputs.cache-hit != 'true'
        run: cargo install grcov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Run LLVM coverage analysis
        run: |
          COVERAGE_MODE=branch COVERAGE_THRESHOLD=$COVERAGE_THRESHOLD ./scripts/check_coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/coverage/

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --workspace --exclude aviate-app-quadcopter-stm32h7 --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
