name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, "fix/**", "ci/**"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  file-sizes:
    name: File Sizes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enforce 500-line (and 100-line lib.rs) caps
        run: ./scripts/check_file_sizes.sh

  dialect-generation:
    name: Dialect (mavgen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hash-locked generator toolchain
        run: python3 -m pip install --require-hashes -r scripts/mavlink-requirements.txt

      - name: Generate dialect and verify wire facts
        run: ./scripts/generate_mavlink_dialect.sh --check

  identity-adjudication:
    name: Identity Adjudication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Guard self-test
        run: ./scripts/check_algorithm_identity.sh --self-test

      - name: Adjudicate production algorithm changes
        if: github.event_name == 'pull_request'
        run: |
          ./scripts/check_algorithm_identity.sh             "${{ github.event.pull_request.base.sha }}"             "${{ github.event.pull_request.head.sha }}"

  app-template:
    name: App Template (generate + check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-generate binary
        id: cache-cargo-generate
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-generate
          key: ${{ runner.os }}-cargo-generate-0.23.5

      - name: Install cargo-generate
        if: steps.cache-cargo-generate.outputs.cache-hit != 'true'
        run: cargo install cargo-generate --version 0.23.5 --locked

      - name: Generate the SITL app variant and type-check it
        run: ./scripts/check_app_template.sh

  jmavsim-smoke:
    name: jMAVSim Smoke (no-sim)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-jmavsim-${{ hashFiles('**/Cargo.lock') }}

      - name: Build the jMAVSim app
        run: cargo build -p aviate-app-sitl-jmavsim-generic-quad-x

      # --no-sim exercises the executed path end-to-end short of the
      # Java simulator: app-owned checked kernel construction, board
      # injection, port binding, and the control loop starting. A
      # timeout exit is the loop running as designed.
      - name: Run the no-sim smoke
        run: |
          set +e
          timeout 20 ./target/debug/sitl-jmavsim-generic-quad-x \
            --no-sim --headless > smoke.log 2>&1
          rc=$?
          set -e
          cat smoke.log
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 124 ]; then
            echo "smoke exited with unexpected status $rc" >&2
            exit 1
          fi
          grep -q "Flight controller bound to port" smoke.log
          if grep -qiE "panicked|kernel construction refused" smoke.log; then
            echo "smoke log contains a failure signature" >&2
            exit 1
          fi

  runtime-boundary:
    name: Runtime Boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify aviate-runtime env-flight dependency closure
        run: ./scripts/check_runtime_boundary.sh

      - name: Verify only aviate + aviate-core are publishable
        run: ./scripts/check_publish_deny.sh

  feature-clippy:
    name: Feature Clippy Matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [aviate-core, aviate]
        features:
          - "--no-default-features"
          - "--no-default-features --features mc"
          - "--no-default-features --features fw"
          - "--no-default-features --features vtol"
          - "--no-default-features --features test-hooks"
          - "--all-features"
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy ${{ matrix.crate }} ${{ matrix.features }}
        run: cargo clippy -p ${{ matrix.crate }} ${{ matrix.features }} --locked -- -D warnings

  release-scripts:
    name: Release Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install release toolchain (pinned to match the release workflow)
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Publish-decision self-test (mocked, no network)
        run: bash scripts/release_publish.sh --self-test

      - name: Preflight — package both crates, VCS-match, external consumer
        # Exercises the real packaging/provenance/consumer path on every PR
        # (no auth, no publish). Uses the checked-out commit as the expected
        # VCS sha, which is what cargo records for a clean tree.
        run: ./scripts/release_preflight.sh "$(cargo metadata --no-deps --locked --format-version 1 | jq -r '.packages[] | select(.name=="aviate-core") | .version')" "$(git rev-parse HEAD)"

  floors-lower-lint:
    name: Floors Lower Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the lint can diff cert/floors.toml against
          # the base ref regardless of merge style.
          fetch-depth: 0

      - name: Resolve merged-PR body (push events only)
        # On push events `github.event.pull_request` is empty even when
        # the push was produced by merging a PR. Under plain merge-commits
        # the head commit is a mechanical "Merge pull request #N..."
        # subject, so a `Lower-Floor:` line written in the PR body would
        # be lost. Fetch the PR(s) associated with the pushed commit via
        # the API; for a direct-to-main push the endpoint returns empty.
        if: github.event_name == 'push'
        id: merged-pr-body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bodies=$(gh api \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
            --jq '.[] | .body // ""' 2>/dev/null || echo "")
          {
            echo 'pr_bodies<<_END_OF_PR_BODIES_'
            printf '%s\n' "$bodies"
            echo '_END_OF_PR_BODIES_'
          } >> "$GITHUB_OUTPUT"

      - name: Lint floor decreases against Lower-Floor override
        shell: bash
        env:
          # The override line can legitimately live in several places
          # depending on merge style:
          #   - pull_request event: PR body.
          #   - push event, squash-merge: GitHub copies the PR body into
          #     head_commit.message.
          #   - push event, merge-commit: the merged PR's body (fetched
          #     above) or one of the branch commits merged in.
          #   - push event, rebase-merge: one of the pushed commits.
          # Plumbing all four haystacks means the gate works the same
          # regardless of merge style.
          PR_BODY: |
            ${{ github.event.pull_request.body }}
            ${{ steps.merged-pr-body.outputs.pr_bodies }}
            ${{ github.event.head_commit.message }}
          PUSH_COMMITS_MESSAGES: ${{ toJSON(github.event.commits.*.message) }}
        run: |
          # Concatenate the push-commits messages array (JSON-encoded
          # strings) onto PR_BODY. jq -r preserves per-element internal
          # newlines, which the script's `^Lower-Floor:` line anchor
          # needs.
          if [ -n "${PUSH_COMMITS_MESSAGES:-}" ] && [ "${PUSH_COMMITS_MESSAGES}" != "null" ]; then
            extra=$(printf '%s' "$PUSH_COMMITS_MESSAGES" | jq -r '.[]? // empty' || true)
            PR_BODY=$(printf '%s\n%s' "$PR_BODY" "$extra")
          fi
          export PR_BODY
          base="origin/main"
          # On push-to-main the checkout IS main; diff against the
          # commit before the push so the lint still sees the change.
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            base="${{ github.event.before }}"
          fi
          ./scripts/floors-lower-lint.sh "$base"

  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # libudev-sys (transitive via `serialport`) needs libudev headers
      # at build time on Linux. macOS/Windows are fine without this.
      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install ARM targets
        run: rustup target add thumbv7em-none-eabihf thumbv8m.main-none-eabihf

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            aviate-bootloader/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify workspace manifest
        run: cargo metadata --no-deps --format-version 1 > /dev/null

      - name: Check workspace (host)
        run: cargo check --workspace

      - name: Check embedded HAL on thumbv7em
        run: cargo check --manifest-path aviate-hal/stm32h7/Cargo.toml --target thumbv7em-none-eabihf

      # The MicoAir board crate is excluded from the host workspace
      # (thumbv7em-only), so nothing above compiles it. env-flight is the
      # real-hardware path: hw.rs + USB CDC + aviate-runtime/env-flight.
      - name: Check MicoAir board on thumbv7em (env-flight)
        run: cargo check --manifest-path aviate-boards/micoair-h743-v2/Cargo.toml --target thumbv7em-none-eabihf --features env-flight --locked

      - name: Clippy MicoAir board on thumbv7em (env-flight)
        run: cargo clippy --manifest-path aviate-boards/micoair-h743-v2/Cargo.toml --target thumbv7em-none-eabihf --features env-flight --locked -- -D warnings

      - name: Build MicoAir board release on thumbv7em (env-flight)
        run: cargo build --manifest-path aviate-boards/micoair-h743-v2/Cargo.toml --target thumbv7em-none-eabihf --features env-flight --locked --release

      - name: Verify bootloader dependency boundary
        run: bash scripts/check_bootloader_dependency_boundary.sh

      - name: Verify RP2350 dependency alignment
        run: bash scripts/check_rp2350_dependency_alignment.sh

      # The bootloader is a standalone workspace, so the root checks do not
      # exercise its target-gated chip code or linker scripts.
      - name: Clippy STM32H743 bootloader on thumbv7em
        run: cargo clippy --manifest-path aviate-bootloader/Cargo.toml --target thumbv7em-none-eabihf --no-default-features --features micoair-h743-v2 --locked -- -D warnings

      - name: Build STM32H743 bootloader release on thumbv7em
        run: cargo build --manifest-path aviate-bootloader/Cargo.toml --target thumbv7em-none-eabihf --no-default-features --features micoair-h743-v2 --locked --release

      - name: Clippy RP2350 bootloader on thumbv8m
        run: cargo clippy --manifest-path aviate-bootloader/Cargo.toml --target thumbv8m.main-none-eabihf --no-default-features --features pico2 --locked -- -D warnings

      - name: Build RP2350 bootloader release on thumbv8m
        run: cargo build --manifest-path aviate-bootloader/Cargo.toml --target thumbv8m.main-none-eabihf --no-default-features --features pico2 --locked --release

      # The test app links into the application partition (0x1001_0000) and
      # shares the bootloader workspace lockfile. Build it before the ELF
      # guard so the verifier can prove the handoff artifact, not just the
      # bootloader.
      - name: Clippy RP2350 test-app on thumbv8m
        run: cargo clippy --manifest-path aviate-bootloader/test-app-rp2350/Cargo.toml --target thumbv8m.main-none-eabihf --locked --release -- -D warnings

      - name: Build RP2350 test-app release on thumbv8m
        run: cargo build --manifest-path aviate-bootloader/test-app-rp2350/Cargo.toml --target thumbv8m.main-none-eabihf --locked --release

      - name: Verify bootloader ELF layout
        run: bash scripts/check_bootloader_images.sh

      - name: Clippy (host)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          cargo test --workspace --all-targets
          cargo test --workspace --doc

      # The behavioral suite now stages faults through the public
      # `state.faults` surface, so it runs under the plain `cargo test
      # --workspace` above (and is witnessed by `cargo evidence check
      # --mode=source`). The `test-hooks` feature still gates the
      # out-of-tree `inject_state` / `inject_fault` hooks (spec §20);
      # compile-check it so the injector cannot silently rot.
      - name: Compile-check test-hooks feature (spec §20 injector)
        run: cargo check -p aviate-core --features test-hooks --all-targets

  coverage:
    name: Coverage (region+branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust nightly + llvm-tools
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add llvm-tools-preview --toolchain nightly

      - name: Cache grcov binary
        id: cache-grcov
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/grcov
          key: ${{ runner.os }}-grcov-0.10

      - name: Install grcov
        if: steps.cache-grcov.outputs.cache-hit != 'true'
        run: cargo install grcov

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Run region+branch coverage analysis
        run: |
          COVERAGE_MODE=branch ./scripts/check_coverage.sh

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: target/coverage/

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cargo fmt --manifest-path aviate-bootloader/Cargo.toml --all -- --check

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # In-boundary crates carry `#![deny(missing_docs)]`, so a public item
      # without a doc comment fails this rustdoc build (as well as clippy and
      # the release build). `-D warnings` promotes every remaining rustdoc
      # diagnostic — broken intra-doc links included — to an error.
      - name: Build documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace (release)
        run: cargo build --workspace --release

  evidence:
    name: Evidence (doctor + floors)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          # Full history so the tool's merge-style policy check can
          # inspect recent main commits without "shallow clone detected"
          # complaints.
          fetch-depth: 0

      # `cargo evidence check --mode=source` runs `cargo test --workspace`,
      # which builds the serial/udev-backed crates; without libudev the
      # build script panics in pkg-config before any evidence runs.
      - name: Install system libudev
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-evidence-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo-evidence binary
        id: cache-cargo-evidence
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-evidence
          key: ${{ runner.os }}-cargo-evidence-bin-0.1.4

      - name: Install cargo-evidence
        if: steps.cache-cargo-evidence.outputs.cache-hit != 'true'
        run: cargo install cargo-evidence --version 0.1.4 --locked

      # Blocking: fails only on error-severity findings (missing
      # boundary, missing floors, invalid trace). Warnings — merge-style,
      # floors-boundary-mismatch, CI-integration-missing — are reported
      # but do not fail the job.
      - name: cargo evidence doctor
        run: cargo evidence doctor

      # Blocking: structural validation of every trace TOML — dangling
      # uids, missing covers, malformed entries, broken uid/id pairs.
      # A trace that points to a non-existent LLR is a silent
      # cert-evidence rot path; fail fast in CI.
      - name: cargo evidence trace --validate
        run: cargo evidence trace --validate

      # Blocking: fails if any committed floor dimension drops below
      # its recorded value. Lowering a floor requires a `Lower-Floor:`
      # justification line in the PR body / squash commit (see
      # docs/CERT_OVERRIDES.md).
      - name: cargo evidence floors
        run: cargo evidence floors

      # Blocking end-to-end behavioral gate. `--mode=source` runs the
      # workspace's tests and validates each requirement claim against
      # the trace — REQ_PASS for satisfied, REQ_GAP for unsatisfied,
      # exit 2 on any GAP. Equivalent to the `--mode=bundle` gate the
      # cert profile documents, with the bundle generation step
      # collapsed into the same job. Configured per
      # docs/AVIATE_CORE_BEHAVIORAL_REQUIREMENTS.md §5.
      #
      # NB: this re-runs `cargo test --workspace` inside the evidence
      # check. It overlaps with the dedicated test job but is required
      # here so a green evidence run is self-contained (auditors don't
      # have to cross-reference job IDs to know what was verified).
      - name: cargo evidence check --mode=source
        run: cargo evidence check --mode=source

  sitl_build:
    name: SITL Build (Gazebo XIL)
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.shards.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # Gazebo Harmonic (gz-sim8 / gz-transport13 / gz-msgs10 / gz-plugin2)
      # from the OSRF apt repo, plus the toolchain the C++ plugin and the
      # serialport-backed gcs-test need. The plugin links protobuf via
      # gz-msgs10; libudev is a transitive serialport build dependency.
      - name: Install Gazebo Harmonic + build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg cmake build-essential \
            libudev-dev libprotobuf-dev protobuf-compiler libabsl-dev
          sudo curl https://packages.osrfoundation.org/gazebo.gpg \
            --output /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sitl-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate mission manifest and emit shard matrix
        id: shards
        run: |
          ./scripts/check_mission_manifest.py
          echo "matrix=$(./scripts/check_mission_manifest.py --emit-shard-matrix)" >> "$GITHUB_OUTPUT"

      - name: Build shared SITL artifact
        run: |
          ./scripts/build_gz_plugin.sh
          cargo build -p gcs-test --features gazebo
          cargo build -p aviate-app-sitl-gazebo-x500
          sha256sum \
            target/debug/gcs-test \
            target/debug/sitl-gazebo-x500 \
            aviate-hal/xil/backends/gz/plugin/build/libAviateGzPlugin.so \
            aviate-hal/xil/backends/gz/plugin/build/libMotorFailurePlugin.so \
            > sitl-artifact.sha256
          tar -cf sitl-artifact.tar \
            sitl-artifact.sha256 \
            target/debug/gcs-test \
            target/debug/sitl-gazebo-x500 \
            aviate-hal/xil/backends/gz/plugin/build/libAviateGzPlugin.so \
            aviate-hal/xil/backends/gz/plugin/build/libMotorFailurePlugin.so

      - name: Upload shared SITL artifact
        uses: actions/upload-artifact@v7
        with:
          name: sitl-linux-x64
          path: sitl-artifact.tar
          compression-level: 0
          retention-days: 1
          if-no-files-found: error

  # Every runner pays the Gazebo install and checkout overhead. Keep each
  # shard at 3-5 minutes of mission execution, excluding that setup time;
  # add a shard only when the existing missions cannot stay below the upper
  # bound after rebalancing. Missions need separate runners because their
  # fixed UDP ports, shared-memory names, and cleanup processes conflict.
  # See docs/SITL_CI_SHARDING.md for the update procedure and cost model.
  sitl_missions:
    name: SITL Missions (Gazebo XIL) / ${{ matrix.name }}
    needs: sitl_build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.sitl_build.outputs.shard_matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Gazebo Harmonic runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg \
            xvfb libgl1-mesa-dri libegl1 mesa-utils
          sudo curl https://packages.osrfoundation.org/gazebo.gpg \
            --output /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Download shared SITL artifact
        uses: actions/download-artifact@v8
        with:
          name: sitl-linux-x64

      - name: Verify shared SITL artifact
        run: |
          tar -xf sitl-artifact.tar
          sha256sum --check sitl-artifact.sha256
          test -x target/debug/gcs-test
          test -x target/debug/sitl-gazebo-x500

      # Each mission runs behind the reliability bar the manifest
      # assigns it (run_sitl_missions.sh exits non-zero if any mission
      # misses its bar, and prints the failing phase). These are the
      # XIL-tier witnesses for arm/takeoff/hover/land (FLT-201),
      # hover-position stability (CTL-203), GNSS-dropout dead reckoning
      # (EST-206), position convergence (EST-203), command-timeout
      # failsafe (FLT-204), and IMU-NaN numeric-fault isolation
      # (EST-204), end-to-end through the FC↔Gazebo control loop.
      # Gate membership and quarantine live in
      # tests/missions/manifest.json, not here.
      - name: Run SITL mission shard
        env:
          GCS_TEST_BIN: ./target/debug/gcs-test
          LIBGL_ALWAYS_SOFTWARE: 1
        run: xvfb-run -a ./scripts/run_sitl_missions.sh ${{ matrix.missions }}

  # Quarantined missions run visibly but never feed CI Success: a red
  # here is truth about the quarantine, not a merge gate. Runs on main
  # pushes to bound per-PR minutes; membership and tracking issues live
  # in tests/missions/manifest.json.
  sitl_quarantine:
    name: SITL Quarantine (non-blocking)
    needs: sitl_build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install Gazebo Harmonic runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y curl lsb-release gnupg \
            xvfb libgl1-mesa-dri libegl1 mesa-utils
          sudo curl https://packages.osrfoundation.org/gazebo.gpg \
            --output /usr/share/keyrings/pkgs-osrf-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/pkgs-osrf-archive-keyring.gpg] http://packages.osrfoundation.org/gazebo/ubuntu-stable $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/gazebo-stable.list
          sudo apt-get update
          sudo apt-get install -y gz-harmonic

      - name: Download shared SITL artifact
        uses: actions/download-artifact@v8
        with:
          name: sitl-linux-x64

      - name: Unpack shared SITL artifact
        run: |
          tar -xf sitl-artifact.tar
          sha256sum --check sitl-artifact.sha256
          test -x target/debug/gcs-test
          test -x target/debug/sitl-gazebo-x500

      - name: Run quarantined missions
        env:
          GCS_TEST_BIN: ./target/debug/gcs-test
          LIBGL_ALWAYS_SOFTWARE: 1
        run: |
          missions=$(./scripts/check_mission_manifest.py --emit-quarantine-missions)
          xvfb-run -a ./scripts/run_sitl_missions.sh $missions

  ci-success:
    name: CI Success
    if: always()
    needs:
      - file-sizes
      - dialect-generation
      - identity-adjudication
      - app-template
      - jmavsim-smoke
      - runtime-boundary
      - feature-clippy
      - release-scripts
      - floors-lower-lint
      - check
      - test
      - coverage
      - format
      - doc
      - build-release
      - evidence
      - sitl_build
      - sitl_missions
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every blocking gate succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: |
          echo "A blocking gate did not succeed: ${{ toJSON(needs.*.result) }}"
          exit 1
      - name: All blocking gates green
        run: echo "All blocking gates succeeded"
