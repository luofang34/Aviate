name: Release

# Publishes aviate-core and aviate to crates.io via OIDC Trusted Publishing.
# No long-lived token is stored anywhere: rust-lang/crates-io-auth-action mints
# a short-lived token from the workflow's OIDC identity and revokes it when the
# job ends. All safety and provenance checks run BEFORE the token is requested.
#
# Trigger: pushing a `vX.Y.Z` tag. A failed run is safe to re-run from the
# Actions tab: an already-published version is skipped only when its crates.io
# checksum matches the archive this commit produces and it is not yanked;
# otherwise the run fails rather than skip a mismatched/yanked artifact.

on:
  push:
    tags:
      - "v*"

# Serialize release runs; never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege. `id-token: write` is required for OIDC; `checks: read`
# lets us confirm CI Success on the exact commit. No `contents: write`.
permissions:
  contents: read
  checks: read
  id-token: write

env:
  # Pinned toolchain — never floating stable.
  RUST_TOOLCHAIN: "1.95.0"
  # The only crates this workflow is allowed to publish, in dependency order.
  PUBLISH_CRATES: "aviate-core aviate"

jobs:
  release:
    name: Validate and publish
    runs-on: ubuntu-latest
    # Gated by the protected `crates-io-release` environment (v* tags only,
    # no admin bypass). Trusted Publishing on crates.io must name this env.
    environment: crates-io-release
    steps:
      - name: Checkout (full history for reachability check)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Standalone crates (e.g. the MicoAir board) path-depend on the
          # external/ submodules, so the --locked lockfile check needs them.
          submodules: recursive
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # --- Validation (all before OIDC auth) ------------------------------

      - name: Resolve versions and validate tag
        id: meta
        run: |
          set -euo pipefail
          meta="$(cargo metadata --no-deps --locked --format-version 1)"
          core_ver="$(jq -r '.packages[] | select(.name=="aviate-core") | .version' <<<"$meta")"
          facade_ver="$(jq -r '.packages[] | select(.name=="aviate")      | .version' <<<"$meta")"
          [[ -n "$core_ver" && -n "$facade_ver" ]] \
            || { echo "::error::aviate-core and/or aviate not found in workspace"; exit 1; }
          [[ "$core_ver" == "$facade_ver" ]] \
            || { echo "::error::version mismatch: aviate-core=$core_ver aviate=$facade_ver"; exit 1; }
          [[ "${GITHUB_REF_NAME}" == "v${core_ver}" ]] \
            || { echo "::error::tag ${GITHUB_REF_NAME} != v${core_ver}"; exit 1; }
          echo "version=$core_ver" >> "$GITHUB_OUTPUT"
          echo "Releasing v$core_ver"

      - name: Verify the tagged commit is on protected main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          # `git fetch origin main` records the fetched tip in FETCH_HEAD.
          git merge-base --is-ancestor "${GITHUB_SHA}" FETCH_HEAD \
            || { echo "::error::${GITHUB_SHA} is not reachable from protected main"; exit 1; }

      - name: Verify required CI Success passed on this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusions="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="CI Success") | .conclusion' | sort -u)"
          [[ -n "$conclusions" ]] \
            || { echo "::error::no 'CI Success' check run on ${GITHUB_SHA}"; exit 1; }
          [[ "$conclusions" == "success" ]] \
            || { echo "::error::CI Success on ${GITHUB_SHA} is '${conclusions}', not success"; exit 1; }

      - name: Verify only aviate-core and aviate are publishable
        # Inventories every first-party manifest, not just root workspace
        # members, so an excluded/standalone crate cannot be publishable.
        run: ./scripts/check_publish_deny.sh

      - name: Verify committed lockfiles are up to date (--locked)
        run: ./scripts/check_release_lockfiles.sh

      - name: Verify package contents (license texts + corrected safety wording)
        run: ./scripts/check_release_package_contents.sh

      - name: Feature matrix and documentation
        run: |
          set -euo pipefail
          cargo check -p aviate-core --locked --no-default-features
          cargo check -p aviate-core --locked --all-features
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --locked -p aviate-core -p aviate

      - name: Preflight — package both crates, VCS-match, external consumer
        # Packages aviate-core and aviate, asserts each archive's
        # .cargo_vcs_info.json records the tagged commit, and builds a
        # throwaway consumer against the PACKAGED sources.
        run: ./scripts/release_preflight.sh "${{ steps.meta.outputs.version }}" "${GITHUB_SHA}"

      # --- Authenticate (short-lived OIDC token) --------------------------

      - name: Mint short-lived crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      # --- Publish (checksum/yank-aware, idempotent, dependency order) ----

      - name: Publish aviate-core, then aviate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: ./scripts/release_publish.sh "${{ steps.meta.outputs.version }}"

  github-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    # Isolated from the publishing job: only this job gets contents: write,
    # and it never touches the crates.io OIDC token.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create or verify the GitHub Release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          title="${GITHUB_REF_NAME}"
          if info="$(gh release view "${GITHUB_REF_NAME}" --json tagName,name,isDraft,isPrerelease 2>/dev/null)"; then
            # A release already exists (rerun): verify it is the published,
            # non-draft, non-prerelease release for exactly this tag.
            tag="$(jq -r '.tagName' <<<"$info")"
            name="$(jq -r '.name' <<<"$info")"
            draft="$(jq -r '.isDraft' <<<"$info")"
            prerelease="$(jq -r '.isPrerelease' <<<"$info")"
            [ "$tag" = "${GITHUB_REF_NAME}" ] || { echo "::error::existing release tag ${tag} != ${GITHUB_REF_NAME}"; exit 1; }
            [ "$name" = "$title" ]            || { echo "::error::existing release title '${name}' != '${title}'"; exit 1; }
            [ "$draft" = "false" ]            || { echo "::error::existing release ${GITHUB_REF_NAME} is a draft"; exit 1; }
            [ "$prerelease" = "false" ]       || { echo "::error::existing release ${GITHUB_REF_NAME} is a prerelease"; exit 1; }
            echo "Release ${GITHUB_REF_NAME} already exists and matches (tag/title/published) — verified."
            exit 0
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --latest \
            --title "$title" \
            --notes "Published \`aviate\` ${version} and \`aviate-core\` ${version} to crates.io via Trusted Publishing."
