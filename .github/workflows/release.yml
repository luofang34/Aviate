name: Release

# Publishes aviate-core and aviate to crates.io via OIDC Trusted Publishing.
# No long-lived token is stored anywhere: rust-lang/crates-io-auth-action mints
# a short-lived token from the workflow's OIDC identity and revokes it when the
# job ends. All safety and provenance checks run BEFORE the token is requested.
#
# Trigger: pushing a `vX.Y.Z` tag. A failed run is safe to re-run from the
# Actions tab (idempotent: an already-published version is skipped).

on:
  push:
    tags:
      - "v*"

# Serialize release runs; never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege. `id-token: write` is required for OIDC; `checks: read`
# lets us confirm CI Success on the exact commit. No `contents: write`.
permissions:
  contents: read
  checks: read
  id-token: write

env:
  # Pinned toolchain — never floating stable.
  RUST_TOOLCHAIN: "1.95.0"
  # The only crates this workflow is allowed to publish, in dependency order.
  PUBLISH_CRATES: "aviate-core aviate"

jobs:
  release:
    name: Validate and publish
    runs-on: ubuntu-latest
    # Gated by the protected `crates-io-release` environment (v* tags only,
    # no admin bypass). Trusted Publishing on crates.io must name this env.
    environment: crates-io-release
    steps:
      - name: Checkout (full history for reachability check)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # --- Validation (all before OIDC auth) ------------------------------

      - name: Resolve versions and validate tag
        id: meta
        run: |
          set -euo pipefail
          meta="$(cargo metadata --no-deps --format-version 1)"
          core_ver="$(jq -r '.packages[] | select(.name=="aviate-core") | .version' <<<"$meta")"
          facade_ver="$(jq -r '.packages[] | select(.name=="aviate")      | .version' <<<"$meta")"
          [[ -n "$core_ver" && -n "$facade_ver" ]] \
            || { echo "::error::aviate-core and/or aviate not found in workspace"; exit 1; }
          [[ "$core_ver" == "$facade_ver" ]] \
            || { echo "::error::version mismatch: aviate-core=$core_ver aviate=$facade_ver"; exit 1; }
          [[ "${GITHUB_REF_NAME}" == "v${core_ver}" ]] \
            || { echo "::error::tag ${GITHUB_REF_NAME} != v${core_ver}"; exit 1; }
          echo "version=$core_ver" >> "$GITHUB_OUTPUT"
          echo "Releasing v$core_ver"

      - name: Verify the tagged commit is on protected main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          # `git fetch origin main` records the fetched tip in FETCH_HEAD.
          git merge-base --is-ancestor "${GITHUB_SHA}" FETCH_HEAD \
            || { echo "::error::${GITHUB_SHA} is not reachable from protected main"; exit 1; }

      - name: Verify required CI Success passed on this exact commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusions="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name=="CI Success") | .conclusion' | sort -u)"
          [[ -n "$conclusions" ]] \
            || { echo "::error::no 'CI Success' check run on ${GITHUB_SHA}"; exit 1; }
          [[ "$conclusions" == "success" ]] \
            || { echo "::error::CI Success on ${GITHUB_SHA} is '${conclusions}', not success"; exit 1; }

      - name: Verify only aviate-core and aviate are publishable
        run: |
          set -euo pipefail
          # `publish == null` means unrestricted (publishable to any registry).
          publishable="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.publish == null) | .name' | sort | tr '\n' ' ' | xargs)"
          expected="aviate aviate-core"
          [[ "$publishable" == "$expected" ]] \
            || { echo "::error::publishable set is '{$publishable}', expected '{$expected}'"; exit 1; }

      - name: Verify committed lockfiles are up to date (--locked)
        run: |
          set -euo pipefail
          while IFS= read -r lock; do
            dir="$(dirname "$lock")"
            echo "checking $dir"
            cargo tree --locked --manifest-path "$dir/Cargo.toml" >/dev/null \
              || { echo "::error::$lock is not up to date (--locked failed)"; exit 1; }
          done < <(git ls-files 'Cargo.lock' '**/Cargo.lock')

      - name: Verify package contents (license texts + corrected safety wording)
        run: |
          set -euo pipefail
          for crate in $PUBLISH_CRATES; do
            list="$(cargo package --list -p "$crate")"
            for f in LICENSE-MIT LICENSE-APACHE README.md; do
              grep -qx "$f" <<<"$list" \
                || { echo "::error::$crate package is missing $f"; exit 1; }
            done
            # Corrected safety wording present; blanket real-hardware ban absent.
            crate_dir="$(cargo metadata --no-deps --format-version 1 \
              | jq -r --arg n "$crate" '.packages[] | select(.name==$n) | .manifest_path' \
              | xargs dirname)"
            grep -q "control a real vehicle" "$crate_dir/README.md" \
              || { echo "::error::$crate README missing corrected safety wording"; exit 1; }
            ! grep -q "Do not deploy it on real hardware" "$crate_dir/README.md" \
              || { echo "::error::$crate README still carries the blanket real-hardware ban"; exit 1; }
          done

      - name: Package, feature, doc, and downstream-consumer smoke checks
        run: |
          set -euo pipefail
          # Package (build-verified) for the leaf crate.
          cargo package -p aviate-core --locked
          # Feature matrix on the kernel.
          cargo check -p aviate-core --locked --no-default-features
          cargo check -p aviate-core --locked --all-features
          # Documentation must build clean.
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --locked -p aviate-core -p aviate
          # Downstream consumer: the facade doctest exercises `use aviate::...`.
          cargo test -p aviate --doc --locked

      # --- Authenticate (short-lived OIDC token) --------------------------

      - name: Mint short-lived crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      # --- Publish in dependency order (idempotent) -----------------------

      - name: Publish aviate-core, then aviate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          # Sparse-index path for a crate name (crates.io layout).
          index_path() {
            local c=$1
            case ${#c} in
              1) printf '1/%s' "$c" ;;
              2) printf '2/%s' "$c" ;;
              3) printf '3/%s/%s' "${c:0:1}" "$c" ;;
              *) printf '%s/%s/%s' "${c:0:2}" "${c:2:2}" "$c" ;;
            esac
          }

          version_on_index() {
            local c=$1 v=$2
            curl -sfL "https://index.crates.io/$(index_path "$c")" 2>/dev/null \
              | jq -re --arg v "$v" 'select(.vers == $v) | .vers' >/dev/null 2>&1
          }

          wait_on_index() {
            local c=$1 v=$2
            for _ in $(seq 1 60); do
              if version_on_index "$c" "$v"; then echo "$c $v visible on index"; return 0; fi
              sleep 5
            done
            echo "::error::$c $v did not become visible on the index"; return 1
          }

          publish_crate() {
            local c=$1 v=$2
            if version_on_index "$c" "$v"; then
              echo "$c $v already published — skipping"
              return 0
            fi
            echo "Publishing $c $v"
            cargo publish -p "$c" --locked
            wait_on_index "$c" "$v"
          }

          for c in $PUBLISH_CRATES; do
            publish_crate "$c" "$VERSION"
          done
          echo "Release v$VERSION complete."
