# Aviate Application Template
#
# Generate a new Aviate flight controller application:
#   cargo generate --path aviate-app-template --name my-app
#
# For more options:
#   cargo generate --path aviate-app-template --name my-app -d board=sitl-gazebo -d airframe=x500

[template]
name = "aviate-app"
description = "Generate a new Aviate flight controller application"

[placeholders.board]
type = "string"
prompt = "Target board"
# Board names come from aviate-boards/*/
# Users can add custom boards by creating new board crates
default = "sitl-gazebo"

[placeholders.model]
type = "string"
prompt = "Gazebo model (for SITL)"
choices = ["x500", "x500_depth", "x500_vision", "x500_lidar_2d"]
default = "x500"

[placeholders.airframe]
type = "string"
prompt = "Airframe type (mixer configuration)"
choices = ["x500", "quad-x", "generic-quad"]
default = "x500"

[placeholders.env]
type = "string"
prompt = "Environment (sitl or flight)"
choices = ["sitl", "flight"]
default = "sitl"

# SITL environment: ignore hardware-specific files
[conditional.'env == "sitl"']
ignore = [".cargo/config.toml", "memory.x", "build.rs"]

# Flight environment: ignore SITL-specific files
[conditional.'env == "flight"']
ignore = ["src/lib.rs", "src/world_gen.rs", "src/router_gen.rs"]
